<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICKAAZ | Production Master</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running the app in the browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .btn-interact { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-interact:active { transform: scale(0.95); }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        @keyframes savePulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .animate-save {
            animation: savePulse 1.5s infinite;
        }

        .calendar-box {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .calendar-box:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- Firebase Configuration Logic ---
        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try {
                    return JSON.parse(__firebase_config);
                } catch (e) {
                    console.error("Failed to parse environment config:", e);
                }
            }
            return {
                apiKey: "AIzaSyAfAKZ-WDJo2qb9FOu0u0NyaNig5V04ofg",
                authDomain: "production-master-dashboard.firebaseapp.com",
                projectId: "production-master-dashboard",
                storageBucket: "production-master-dashboard.firebasestorage.app",
                messagingSenderId: "444022330801",
                appId: "1:444022330801:web:bda76dc5ed3b8cab511990"
            };
        };

        const config = getFirebaseConfig();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'production-master-custom';

        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // Helper to parse dynamic dates (like "1st Mon", "Jan 14") to actual integer days of the month
        const parseEventDay = (dateStr, year, monthIndex) => {
            const exactMatch = dateStr.match(/^[A-Za-z]{3}\s(\d+)/);
            if (exactMatch) return parseInt(exactMatch[1], 10);
            
            const nthMatch = dateStr.match(/^(1st|2nd|3rd|4th)\s(Mon|Tue|Wed|Thu|Fri|Sat|Sun)/);
            if (nthMatch) {
                const nthMap = { "1st": 1, "2nd": 2, "3rd": 3, "4th": 4 };
                const dayMap = { "Sun": 0, "Mon": 1, "Tue": 2, "Wed": 3, "Thu": 4, "Fri": 5, "Sat": 6 };
                const targetN = nthMap[nthMatch[1]];
                const targetD = dayMap[nthMatch[2]];
                let count = 0;
                for (let i = 1; i <= 31; i++) {
                    const d = new Date(year, monthIndex, i);
                    if (d.getMonth() !== monthIndex) break;
                    if (d.getDay() === targetD) {
                        count++;
                        if (count === targetN) return i;
                    }
                }
            }
            return null; // For specific holidays labeled "Varies"
        };

        // --- Smart Link Preview Component ---
        const IdeaLinkPreview = ({ url, domain }) => {
            const [imageUrl, setImageUrl] = useState(null);

            useEffect(() => {
                const fetchPreview = async () => {
                    try {
                        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                        const data = await res.json();
                        if (data.status === 'success' && data.data?.image?.url) {
                            setImageUrl(data.data.image.url);
                        }
                    } catch (e) {
                        console.error("Failed to fetch link preview", e);
                    }
                };
                if (url) fetchPreview();
            }, [url]);

            if (imageUrl) {
                return (
                    <a href={url} target="_blank" rel="noopener noreferrer" className="relative block w-20 h-20 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all hover:border-blue-400 hover:scale-105 border border-slate-200 flex-shrink-0 bg-slate-100 group/preview" title="Open Link">
                        <img src={imageUrl} alt="Link Preview" className="w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-black/0 group-hover/preview:bg-black/20 transition-all flex items-center justify-center">
                            <Icon name="external-link" size={20} className="text-white opacity-0 group-hover/preview:opacity-100 drop-shadow-md" />
                        </div>
                    </a>
                );
            }

            return (
                <a href={url} target="_blank" rel="noopener noreferrer" className="hidden sm:flex flex-col items-center justify-center w-20 h-20 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-400 hover:shadow-md transition-all flex-shrink-0 hover:scale-105" title="Open Link">
                    <img src={`https://www.google.com/s2/favicons?domain=${domain}&sz=128`} alt={domain} className="w-8 h-8 mb-1.5 object-contain opacity-80" />
                    <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest truncate w-16 text-center">{domain.replace('www.', '')}</span>
                </a>
            );
        };

        // --- Custom Dropdown Component for Post Types ---
        const PostTypeDropdown = ({ value, onChange, isLast }) => {
            const [isOpen, setIsOpen] = useState(false);
            const options = [
                { id: 'Static', icon: 'image', label: 'Static' },
                { id: 'Video', icon: 'video', label: 'Video' },
                { id: 'Carousel', icon: 'layers', label: 'Carousel' }
            ];

            const currentOption = options.find(o => o.id === value) || options[0];

            return (
                <div className="relative w-full">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full bg-slate-50 border border-slate-200 outline-none text-xs font-bold text-slate-700 px-4 py-3 rounded-xl transition-all cursor-pointer shadow-sm flex items-center justify-between gap-2 hover:bg-white focus:ring-2 focus:ring-blue-100"
                    >
                        <div className="flex items-center gap-2.5">
                            <Icon name={currentOption.icon} size={14} className="text-blue-500" />
                            {currentOption.label}
                        </div>
                        <Icon name="chevron-down" size={14} className="text-slate-400" />
                    </button>
                    
                    {isOpen && (
                        <>
                            <div className="fixed inset-0 z-[50]" onClick={() => setIsOpen(false)}></div>
                            <div className={`absolute left-0 w-full bg-white border border-slate-100 rounded-xl shadow-2xl z-[60] overflow-hidden flex flex-col py-1 ${isLast ? 'bottom-full mb-2' : 'top-full mt-2'}`}>
                                {options.map(opt => (
                                    <button
                                        key={opt.id}
                                        onClick={() => { onChange(opt.id); setIsOpen(false); }}
                                        className="w-full text-left px-4 py-3 text-xs font-bold text-slate-600 hover:bg-slate-50 flex items-center gap-2.5 transition-all"
                                    >
                                        <Icon name={opt.icon} size={14} className={value === opt.id ? "text-blue-600" : "text-slate-400"} />
                                        <span className={value === opt.id ? "text-slate-900" : ""}>{opt.label}</span>
                                    </button>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [authStatus, setAuthStatus] = useState('connecting');
            const [errorMessage, setErrorMessage] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // Layout View Mode & Sub-tab switching state
            const [activeInnerTab, setActiveInnerTab] = useState('pipeline'); // 'pipeline', 'vault', 'competitors', 'resources'
            const [selectedDay, setSelectedDay] = useState("");
            const [selectedIdeaClient, setSelectedIdeaClient] = useState("Global Strategy");
            const [newIdea, setNewIdea] = useState("");
            
            // Modal state for editing a specific post in the calendar view
            const [selectedPostDayIdx, setSelectedPostDayIdx] = useState(null);

            // Current Date/Month Setup for Auto-Refreshing calendar structure
            const currentYear = currentTime.getFullYear();
            const currentMonth = currentTime.getMonth();
            const currentDayOfMonth = currentTime.getDate();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const monthName = currentTime.toLocaleString('default', { month: 'long' });

            // Detect starting week day offset for calendar mapping
            const startingDayOfWeekOffset = useMemo(() => {
                return new Date(currentYear, currentMonth, 1).getDay();
            }, [currentYear, currentMonth]);

            // Calendar Special Days Data
            const calendarEvents = useMemo(() => [
                { month: "January", events: [{ date: "Jan 1", name: "New Year's Day", type: "Global" }, { date: "Jan 25", name: "Burns Night", type: "UK" }, { date: "Jan 27", name: "Int. Holocaust Remembrance Day", type: "Global" }] },
                { month: "February", events: [{ date: "Feb 14", name: "Valentine’s Day", type: "Global" }, { date: "3rd Mon", name: "Family Day", type: "Canada" }] },
                { month: "March", events: [{ date: "Mar 1", name: "St. David's Day (Wales)", type: "UK" }, { date: "Mar 8", name: "Int. Women's Day", type: "Global" }, { date: "Mar 9", name: "Commonwealth Day", type: "UK" }, { date: "Mar 15", name: "Mothering Sunday", type: "UK" }, { date: "Mar 17", name: "St. Patrick's Day", type: "UK/Int" }, { date: "Mar 22", name: "World Water Day", type: "Global" }] },
                { month: "April", events: [{ date: "Apr 1", name: "April Fools' Day", type: "Global" }, { date: "Apr 3", name: "Good Friday", type: "UK/Can" }, { date: "Apr 6", name: "Easter Monday", type: "UK/Can" }, { date: "Apr 22", name: "Earth Day", type: "Global" }, { date: "Apr 23", name: "St. George's Day (England)", type: "UK" }] },
                { month: "May", events: [{ date: "May 1", name: "May Day / Labour Day", type: "UK/Int" }, { date: "May 4", name: "Early May Bank Holiday", type: "UK" }, { date: "May 25", name: "Spring Bank Holiday", type: "UK" }, { date: "Varies", name: "Victoria Day", type: "Canada" }] },
                { month: "June", events: [{ date: "Jun 5", name: "World Environment Day", type: "Global" }, { date: "Jun 13", name: "King's Official Birthday", type: "UK" }, { date: "Jun 21", name: "Father's Day", type: "Global" }, { date: "Jun 21", name: "Nat. Indigenous Peoples Day", type: "Canada" }] },
                { month: "July", events: [{ date: "Jul 1", name: "Canada Day", type: "Canada" }, { date: "Jul 13", name: "Orangemen's Day (NI)", type: "UK" }] },
                { month: "August", events: [{ date: "1st Mon", name: "Civic Holiday", type: "Canada" }, { date: "Aug 3", name: "Summer Bank Holiday (Scotland)", type: "UK" }, { date: "Aug 31", name: "August Bank Holiday", type: "UK" }] },
                { month: "September", events: [{ date: "1st Mon", name: "Labour Day", type: "Canada" }, { date: "Sep 30", name: "Truth & Reconciliation Day", type: "Canada" }] },
                { month: "October", events: [{ date: "2nd Mon", name: "Thanksgiving", type: "Canada" }, { date: "Oct 31", name: "Halloween", type: "Global" }] },
                { month: "November", events: [{ date: "Nov 5", name: "Bonfire Night (Guy Fawkes)", type: "UK" }, { date: "Nov 11", name: "Remembrance Day", type: "UK/Can" }, { date: "Nov 30", name: "St. Andrew's Day (Scotland)", type: "UK" }] },
                { month: "December", events: [{ date: "Dec 25", name: "Christmas Day", type: "Global" }, { date: "Dec 26", name: "Boxing Day", type: "UK/Can" }, { date: "Dec 31", name: "New Year's Eve", type: "Global" }] }
            ], []);

            const getEventsForDay = useCallback((dayNum) => {
                const monthData = calendarEvents.find(m => m.month === monthName);
                if (!monthData) return [];
                return monthData.events.filter(ev => {
                    const evDay = parseEventDay(ev.date, currentYear, currentMonth);
                    return evDay === dayNum;
                });
            }, [monthName, currentYear, currentMonth, calendarEvents]);

            // Content Database State
            const [ideas, setIdeas] = useState({});
            const [resources, setResources] = useState({});
            const [postsData, setPostsData] = useState({});
            const [competitorsData, setCompetitorsData] = useState({});

            const clientsData = useMemo(() => ({
                Master: { name: "Monthly Overview", focus: "Global production status.", icon: "layout-dashboard" },
                Calendar: { name: "Events & Holidays", focus: "UK, Canada & Int. Key Dates.", icon: "calendar-heart" },
                Monday: { name: "Tours Coach (Canada)", focus: "Group travel imagery & event-based transport ads.", icon: "bus" },
                Tuesday: { name: "Universal Holidays (UK)", focus: "High-end travel flyers & holiday package graphics.", icon: "plane" },
                Wednesday: { name: "Tours Coach (Canada)", focus: "Group travel imagery & event-based transport ads.", icon: "bus" },
                Thursday: { name: "Fly Universal (UK)", focus: "Last Minute deal templates & flight route maps.", icon: "plane-takeoff" },
                Friday: { name: "Airfleet Limo (Canada)", focus: "Professional fleet showcases & service area highlights.", icon: "car" }
            }), []);

            const vaultTabs = [
                { id: "Universal Holidays (UK)", label: "Univ Hol" },
                { id: "Fly Universal (UK)", label: "Fly Univ" },
                { id: "Airfleet Limo (Canada)", label: "Airfleet" },
                { id: "Tours Coach (Canada)", label: "Tours" },
                { id: "Ideal Hajj & Umrah (UK)", label: "Ideal Hajj" },
                { id: "Global Strategy", label: "Global" }
            ];

            const fullWeekDays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const todayStr = fullWeekDays[new Date().getDay()];
            const actualToday = (todayStr === "Sunday" || todayStr === "Saturday") ? "Monday" : todayStr;
            
            const displayDays = ["Master", "Calendar", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];

            // Set initial state correctly
            useEffect(() => {
                setSelectedDay(actualToday);
            }, [actualToday]);

            // Auto-sync Idea Vault tab to the currently selected Day (except on Master/Calendar view)
            useEffect(() => {
                if (selectedDay === "Master" || selectedDay === "Calendar" || !selectedDay) return; 
                const clientName = clientsData[selectedDay]?.name;
                if (clientName === "Maintenance" || clientName === "Rest") {
                    setSelectedIdeaClient("Global Strategy");
                } else {
                    setSelectedIdeaClient(clientName || "Global Strategy");
                }
            }, [selectedDay, clientsData]);

            useEffect(() => {
                const initAuth = async () => { 
                    try { 
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { 
                        console.error("Auth Error:", e);
                        setAuthStatus('error');
                        setErrorMessage("Auth failed: " + e.message);
                    } 
                };
                initAuth();
                return auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) {
                        setAuthStatus('connected');
                        setErrorMessage(null);
                    }
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // --- PERMANENT GLOBAL CLOUD PATH ---
                const path = `/artifacts/${appId}/public/data/dashboard/current`;
                const docRef = db.doc(path);
                
                const unsubscribe = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        if (data.ideas) setIdeas(data.ideas);
                        if (data.resources) setResources(data.resources);
                        if (data.postsData) setPostsData(data.postsData);
                        if (data.competitorsData) setCompetitorsData(data.competitorsData);
                    }
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setErrorMessage("Database access denied. Check Firebase Rules.");
                });

                return () => unsubscribe();
            }, [user]);

            const syncToCloud = useCallback(async (updates) => {
                if (!user) {
                    setErrorMessage("Error: Disconnected. Sign-in required.");
                    return;
                }
                setIsSyncing(true);
                
                const path = `/artifacts/${appId}/public/data/dashboard/current`;
                const docRef = db.doc(path);
                try { 
                    await docRef.set(updates, { merge: true }); 
                    setErrorMessage(null);
                } catch (e) {
                    console.error("Save Error:", e);
                    setErrorMessage("Save failed: " + e.message);
                } finally { 
                    setIsSyncing(false); 
                }
            }, [user]);

            const updateResource = (clientName, field, value) => {
                const updatedResources = { ...resources, [clientName]: { ...(resources[clientName] || {}), [field]: value } };
                setResources(updatedResources);
                syncToCloud({ resources: updatedResources });
            };

            const addIdea = (e) => {
                e.preventDefault();
                if (!newIdea.trim()) return;
                const updatedIdeas = { 
                    ...ideas, 
                    [selectedIdeaClient]: [...(ideas[selectedIdeaClient] || []), { id: Date.now(), text: newIdea }] 
                };
                setIdeas(updatedIdeas);
                syncToCloud({ ideas: updatedIdeas });
                setNewIdea("");
            };

            const removeIdea = (clientKey, id) => {
                const updated = { ...ideas, [clientKey] : (ideas[clientKey] || []).filter(i => i.id !== id) };
                setIdeas(updated);
                syncToCloud({ ideas: updated });
            };

            // Post Pipeline Functions
            const cyclePostStatus = (status) => {
                if (status === 'todo') return 'in-progress';
                if (status === 'in-progress') return 'published';
                return 'todo';
            };

            // Enhanced update function that stamps the explicit date string
            const updatePostDetails = (index, field, value, specificDateStr) => {
                if (!selectedDay) return;
                const dayPosts = postsData[selectedDay] ? [...postsData[selectedDay]] : [];
                
                // Ensure array size matches the month length
                while(dayPosts.length < daysInMonth) dayPosts.push({ text: "", status: "todo", type: "Static", date: "" });

                // If specificDateStr is provided, it means we are locking the record to that exact date
                if (specificDateStr) {
                    dayPosts[index] = { ...dayPosts[index], [field]: value, date: specificDateStr };
                } else {
                    dayPosts[index] = { ...dayPosts[index], [field]: value };
                }
                
                const newPostsData = { ...postsData, [selectedDay]: dayPosts };
                
                setPostsData(newPostsData);
                syncToCloud({ postsData: newPostsData });
            };

            // Competitor Functions
            const addCompetitorRow = () => {
                if (!selectedDay) return;
                const dayCompetitors = competitorsData[selectedDay] ? [...competitorsData[selectedDay]] : [];
                dayCompetitors.push({ id: Date.now(), name: "", url: "" });
                const newCompData = { ...competitorsData, [selectedDay]: dayCompetitors };
                setCompetitorsData(newCompData);
                syncToCloud({ competitorsData: newCompData });
            };

            const updateCompetitor = (index, field, value) => {
                if (!selectedDay) return;
                const dayCompetitors = [...(competitorsData[selectedDay] || [])];
                dayCompetitors[index] = { ...dayCompetitors[index], [field]: value };
                const newCompData = { ...competitorsData, [selectedDay]: dayCompetitors };
                setCompetitorsData(newCompData);
                syncToCloud({ competitorsData: newCompData });
            };

            const removeCompetitor = (index) => {
                if (!selectedDay) return;
                const dayCompetitors = [...(competitorsData[selectedDay] || [])];
                dayCompetitors.splice(index, 1);
                const newCompData = { ...competitorsData, [selectedDay]: dayCompetitors };
                setCompetitorsData(newCompData);
                syncToCloud({ competitorsData: newCompData });
            };

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Safe fallback logic for resources to prevent crashes if partially saved
            const currentClientSafe = clientsData[selectedDay] || { name: "", focus: "", icon: "layout-dashboard" };
            const clientRes = resources[currentClientSafe.name] || { colors: "", link: "" };
            const safeColors = clientRes.colors || "";
            const safeLink = clientRes.link || "";

            const renderTextWithLinks = (text) => {
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const parts = text.split(urlRegex);
                return parts.map((part, i) => {
                    if (part.match(urlRegex)) {
                        return (
                            <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:text-blue-800 underline transition-colors break-all">
                                {part}
                            </a>
                        );
                    }
                    return <span key={i} className="break-words">{part}</span>;
                });
            };

            // Calculates the global progress for the Master view strictly based on current month's dates
            const calculateGlobalProgress = () => {
                let totalPublished = 0;
                const workDays = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
                workDays.forEach(day => {
                    const dayPosts = postsData[day] || [];
                    for (let i=0; i<daysInMonth; i++) {
                        const expectedDate = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
                        const p = dayPosts[i];
                        if (p && p.status === 'published' && p.date === expectedDate) {
                            totalPublished++;
                        }
                    }
                });
                return totalPublished;
            };

            const globalMaxProgress = 5 * daysInMonth;

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden text-slate-800 antialiased">
                    {errorMessage && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] bg-red-600 text-white text-xs font-black px-6 py-3 rounded-full shadow-2xl animate-pulse flex items-center gap-2">
                            <Icon name="alert-triangle" size={14} /> {errorMessage}
                        </div>
                    )}

                    {/* Pro Sidebar Nav */}
                    <aside className="hidden lg:flex flex-col w-72 bg-slate-900 text-slate-100 flex-shrink-0 border-r border-slate-800">
                        <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                            <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg">
                                <Icon name="check-square" size={24} />
                            </div>
                            <div>
                                <h1 className="text-xl font-extrabold tracking-tighter">RICKAAZ</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Production Master</p>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto py-6 px-4 space-y-8 custom-scrollbar">
                            <div>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 px-3">Overviews</p>
                                <nav className="space-y-1">
                                    {['Master', 'Calendar'].map(d => (
                                        <button 
                                            key={d} 
                                            onClick={() => { setSelectedDay(d); setActiveInnerTab('pipeline'); }}

                                                <h2 className="text-[10px] font-bold text-blue-400 uppercase mb-2 tracking-[0.4em]">Monthly Overview - {monthName} {currentYear}</h2>
                                                <h3 className="text-3xl font-extrabold tracking-tight leading-none">Master Production Board</h3>
                                                <p className="text-sm font-medium text-slate-400 mt-4 max-w-xl">A complete bird's-eye view of all client posts for the month. Track global publishing progress perfectly synced to {monthName}.</p>

                                                </div>
                                            </div>

                                            const dayPosts = postsData[day] || [];

                                            const slots = Array.from({length: daysInMonth}, (_, i) => {
                                                const expectedDate = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;

                                                    p = { status: 'todo', text: '', type: 'Static', date: expectedDate };

                                                return p;

                                                            const isPublished = post.status === 'published';

                                                                    <Icon name={isPublished ? "check-circle" : "circle"} className={isPublished ? "text-green-500" : "text-slate-300"} size={16} />
                                                                    <div className="flex-1 min-w-0">

                                                                </div>

                                                    </button>

                                    </div>

                                            <p className="text-sm font-medium text-indigo-200 mt-4 max-w-xl">Curated major events and holidays for UK, Canada, and International audiences to align your publishing timeline.</p>

                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                            <Icon name={currentClientSafe.icon || "layout-dashboard"} size={180} />
                                        </div>
                                        <div className="relative z-10">
                                            <span className="inline-block bg-blue-500/20 text-blue-300 text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full mb-3 border border-blue-400/30">
                                                {selectedDay} Production Focus
                                            </span>
                                            <h2 className="text-2xl font-extrabold tracking-tight mb-1">{currentClientSafe.name}</h2>

                                                <Icon name={tab.icon} size={15} className={activeInnerTab === tab.id ? 'text-blue-600' : 'text-slate-400'} />

                                                        {monthName} {currentYear} Grid

                                                    <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-green-500"></span> Published</span>

                                                {Array.from({ length: daysInMonth }).map((_, i) => {
                                                    const dayNum = i + 1;
                                                    const isToday = dayNum === currentDayOfMonth;
                                                    const isPast = dayNum < currentDayOfMonth;
                                                    const expectedDateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
                                                    const displayDateStr = `${String(dayNum).padStart(2, '0')}/${String(currentMonth + 1).padStart(2, '0')}/${currentYear}`;
                                                    
                                                    // Parse row's weekday
                                                    const rowDateObj = new Date(currentYear, currentMonth, dayNum);
                                                    const isSunday = rowDateObj.getDay() === 0;
                                                    
                                                    const todaysEvents = getEventsForDay(dayNum);
                                                    let post = (postsData[selectedDay] || [])[i] || { text: "", status: "todo", type: "Static", date: expectedDateStr };
                                                    
                                                    // Handle auto-refresh checks
                                                    if (post.date && post.date !== expectedDateStr) {
                                                        post = { text: "", status: "todo", type: "Static", date: expectedDateStr };
                                                    }

                                                    // Visual layout definitions based on state
                                                    let statusBorder = "border-slate-200 bg-white hover:border-slate-300";
                                                    let statusBadgeStyle = "bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200";
                                                    if (post.status === 'in-progress') {
                                                        statusBorder = "border-yellow-300 bg-yellow-50/10 hover:border-yellow-400";
                                                        statusBadgeStyle = "bg-yellow-100 text-yellow-800 border-yellow-200 hover:bg-yellow-200";
                                                    } else if (post.status === 'published') {
                                                        statusBorder = "border-green-300 bg-green-50/5 hover:border-green-400";
                                                        statusBadgeStyle = "bg-green-100 text-green-800 border-green-200 hover:bg-green-200";

                                                    if (isPast) {
                                                        if (post.status === 'todo') {
                                                            statusBorder = "border-slate-300 bg-slate-200/50 hover:bg-slate-300/50 opacity-75 grayscale-[0.2]";
                                                        } else {
                                                            statusBorder += " opacity-60 grayscale-[0.4]";
                                                        }
                                                    }

                                                    if (isToday) {
                                                        statusBorder += " ring-2 ring-blue-500 ring-offset-2";

                                                        <div 
                                                            key={i} 
                                                            id={`day-row-${dayNum}`}
                                                            onClick={() => setSelectedPostDayIdx(i)}
                                                            className={`calendar-box border rounded-2xl p-2.5 h-32 md:h-36 flex flex-col justify-between shadow-sm cursor-pointer ${statusBorder}`}
                                                        >
                                                            {/* Day Header Row */}
                                                            <div className="flex justify-between items-start">
                                                                <div className="flex items-baseline gap-1">

                                                                    </span>
                                                                    <span className={`text-[9px] font-bold uppercase tracking-wider ${isSunday ? 'text-red-500' : 'text-slate-400'}`}>
                                                                        {rowDateObj.toLocaleDateString('en-GB', { weekday: 'short' })}
                                                                    </span>
                                                                </div>
                                                                {isToday && (
                                                                    <span className="bg-blue-600 text-white text-[7px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded-full">

                                                                    </span>
                                                                )}

                                                            <div className="flex-1 my-1 overflow-hidden">
                                                                {todaysEvents.length > 0 ? (
                                                                    <div className="flex flex-col gap-0.5">
                                                                        {todaysEvents.map((ev, eIdx) => (
                                                                            <span key={eIdx} className="bg-purple-100/90 text-purple-900 border border-purple-200 text-[8px] font-black tracking-tight px-1 py-0.5 rounded-md flex items-center gap-1 truncate" title={ev.name}>
                                                                                <Icon name="star" size={8} className="text-purple-600 fill-purple-600" />
                                                                                {ev.name}
                                                                            </span>
                                                                        ))}
                                                                    </div>
                                                                ) : (
                                                                    <p className="text-[11px] font-semibold text-slate-500 line-clamp-2 leading-tight">
                                                                        {post.text || <span className="text-slate-300 italic font-normal">No details</span>}

                                                                )}

                                                            {/* Bottom Controls Row */}
                                                            <div className="flex items-center justify-between gap-1 mt-1 pt-1.5 border-t border-slate-100">
                                                                <span className="text-[8px] font-black bg-slate-100 text-slate-600 border border-slate-200 px-1.5 py-0.5 rounded-md uppercase tracking-wider select-none">
                                                                    {post.type || 'Static'}
                                                                </span>
                                                                <button 
                                                                    onClick={(e) => {
                                                                        e.stopPropagation(); // Avoid opening edit modal
                                                                        updatePostDetails(i, 'status', cyclePostStatus(post.status), expectedDateStr);
                                                                    }}
                                                                    className={`text-[8px] font-black border px-2 py-0.5 rounded-md uppercase tracking-widest btn-interact select-none ${statusBadgeStyle}`}
                                                                >
                                                                    {post.status === 'in-progress' ? 'Prog' : post.status === 'published' ? 'Done' : 'Todo'}
                                                                </button>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB CONTENT: VAULT */}
                                    {activeInnerTab === 'vault' && (
                                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden fade-in">
                                            <div className="p-6 md:p-8 border-b border-slate-100 bg-slate-50/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                                <div>
                                                    <h2 className="font-extrabold text-slate-900 text-lg flex items-center gap-2"><Icon name="lightbulb" className="text-yellow-500"/> Idea Vault</h2>
                                                    <p className="text-xs text-slate-400 font-medium">Global cross-client brainstorming & reference repository.</p>

                                                            let domain = "";
                                                            if (firstUrl) {
                                                                try { domain = new URL(firstUrl).hostname; } catch(e) {}
                                                            }

                                                            return (
                                                                <div key={idea.id} className="group flex justify-between items-center gap-4 p-4 md:p-5 bg-slate-50 rounded-2xl border border-slate-100 hover:border-yellow-400 hover:bg-white transition-all shadow-sm">
                                                                    <div className="flex-1 min-w-0">
                                                                        <p className="text-sm text-slate-800 font-bold leading-relaxed">{renderTextWithLinks(idea.text)}</p>
                                                                    </div>
                                                                    <div className="flex items-center gap-3 flex-shrink-0">
                                                                        {firstUrl && domain && (
                                                                            <IdeaLinkPreview url={firstUrl} domain={domain} />
                                                                        )}
                                                                        <button onClick={() => removeIdea(selectedIdeaClient, idea.id)} className="text-slate-400 hover:text-red-500 transition-all p-2 bg-white rounded-xl shadow-sm border border-slate-100 flex-shrink-0 hover:bg-red-50">
                                                                            <Icon name="trash-2" size={16} />
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })
                                                    ) : (
                                                        <div className="py-16 text-center border-2 border-dashed border-slate-200 rounded-3xl">
                                                            <Icon name="inbox" className="mx-auto text-slate-200 mb-3" size={40} />
                                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Vault is currently empty</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB CONTENT: COMPETITORS */}
                                    {activeInnerTab === 'competitors' && (
                                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden fade-in">
                                            <div className="p-6 md:p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                                <div>
                                                    <h2 className="font-extrabold text-slate-900 text-lg flex items-center gap-2"><Icon name="target" className="text-red-500"/> Competitors</h2>
                                                    <p className="text-xs text-slate-400 font-medium font-sans">Compare strategy & keep close tabs on market rivals.</p>
                                                </div>
                                                <button onClick={addCompetitorRow} className="bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-[10px] font-black uppercase hover:border-red-300 hover:text-red-500 transition-all shadow-sm flex items-center justify-center gap-2">
                                                    <Icon name="plus" size={12} /> Add Rival
                                                </button>
                                            </div>
                                            <div className="p-6 md:p-8 space-y-4">
                                                {(competitorsData[selectedDay] || []).length > 0 ? (
                                                    (competitorsData[selectedDay] || []).map((comp, i) => (
                                                        <div key={comp.id} className="flex flex-col md:flex-row items-center gap-3 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm transition-all hover:border-red-300 group">
                                                            <div className="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 font-black flex items-center justify-center shadow-inner text-sm flex-shrink-0 border border-slate-100">
                                                                {i + 1}
                                                            </div>
                                                            <input 
                                                                type="text" 
                                                                placeholder="Competitor Name..." 
                                                                className="w-full md:w-1/3 bg-slate-50 outline-none text-sm font-bold text-slate-700 placeholder-slate-400 focus:ring-2 focus:ring-red-100 p-3.5 rounded-xl transition-all shadow-inner"
                                                                value={comp.name}
                                                                onChange={(e) => updateCompetitor(i, 'name', e.target.value)}
                                                            />
                                                            <input 
                                                                type="text" 
                                                                placeholder="Website or Social Link..." 
                                                                className="flex-1 w-full bg-slate-50 outline-none text-sm font-bold text-slate-700 placeholder-slate-400 focus:ring-2 focus:ring-red-100 p-3.5 rounded-xl transition-all shadow-inner"
                                                                value={comp.url}
                                                                onChange={(e) => updateCompetitor(i, 'url', e.target.value)}
                                                            />
                                                            <div className="flex w-full md:w-auto gap-2">
                                                                {comp.url && (
                                                                    <a href={comp.url} target="_blank" className="p-3.5 text-slate-400 hover:text-blue-500 transition-all bg-slate-50 hover:bg-blue-50 rounded-xl">
                                                                        <Icon name="external-link" size={16} />
                                                                    </a>
                                                                )}
                                                                <button onClick={() => removeCompetitor(i)} className="p-3.5 text-slate-400 hover:text-red-500 transition-all bg-slate-50 hover:bg-red-50 rounded-xl flex-1 md:flex-none flex items-center justify-center">
                                                                    <Icon name="trash-2" size={16} />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="py-16 text-center border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center h-full">
                                                        <Icon name="users" size={36} className="text-slate-200 mb-3" />
                                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">No competitors tracked for {selectedDay}</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB CONTENT: RESOURCES */}
                                    {activeInnerTab === 'resources' && (
                                        <section className="bg-white rounded-[2rem] p-8 border border-slate-200 shadow-sm w-full fade-in">
                                            <h2 className="font-extrabold text-slate-900 mb-6 flex items-center gap-3 uppercase tracking-tighter text-sm"><Icon name="paperclip" className="text-blue-600" /> Brand Resources</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                <div>
                                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] block mb-3">Color Palette</label>
                                                    <div className="flex gap-2 flex-wrap mb-4">
                                                        {safeColors.split(',').map((c, i) => c.trim().startsWith('#') && <div key={i} className="w-10 h-10 rounded-2xl border-2 border-white shadow-md" style={{ backgroundColor: c.trim() }} />)}
                                                    </div>
                                                    <input type="text" placeholder="#HEX, #HEX" className="w-full text-[10px] bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-100 font-mono" value={safeColors} onChange={(e) => updateResource(currentClientSafe.name, 'colors', e.target.value)} />
                                                </div>
                                                <div>
                                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] block mb-3">Google Drive Asset Folder</label>
                                                    <div className="flex gap-2">
                                                        <input type="text" placeholder="Drive Folder URL..." className="flex-1 text-[10px] bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none" value={safeLink} onChange={(e) => updateResource(currentClientSafe.name, 'link', e.target.value)} />
                                                        {safeLink && <a href={safeLink} target="_blank" className="p-3 bg-blue-600 text-white rounded-xl shadow-lg flex items-center justify-center"><Icon name="external-link" size={18} /></a>}
                                                    </div>
                                                </div>
                                            </div>
                                        </section>
                                    )}

                                </div>
                            )}

                        </div>
                    </div>

                    {/* ====================================================================== */}
                    {/* RE-DESIGNED QUICK-EDIT MODAL FOR GRID CELLS                            */}
                    {/* ====================================================================== */}
                    {selectedPostDayIdx !== null && selectedDay && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-lg shadow-2xl border border-slate-100 overflow-hidden animate-fade-in flex flex-col">
                                <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                                    <div>
                                        <span className="text-[9px] font-bold text-blue-400 uppercase tracking-widest">
                                            Day {selectedPostDayIdx + 1} • {currentClientSafe.name}
                                        </span>
                                        <h3 className="text-lg font-extrabold tracking-tight">Quick Edit Post</h3>
                                    </div>
                                    <button 
                                        onClick={() => setSelectedPostDayIdx(null)}
                                        className="text-slate-400 hover:text-white p-2 rounded-xl hover:bg-slate-800 transition-colors"
                                    >
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>

                                <div className="p-6 space-y-6">
                                    {/* Locked Date Info with Red Sunday Check */}
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Assigned Date</label>
                                        
                                        {(() => {
                                            const modalDateObj = new Date(currentYear, currentMonth, selectedPostDayIdx + 1);
                                            const isSunday = modalDateObj.getDay() === 0;
                                            const dayOfWeekStr = modalDateObj.toLocaleDateString('en-GB', { weekday: 'short' });
                                            
                                            return (
                                                <div className="bg-slate-100 border border-slate-200 px-4 py-3 rounded-xl flex items-center justify-between text-sm font-bold text-slate-600">
                                                    <span className="flex items-center gap-2">
                                                        {String(selectedPostDayIdx + 1).padStart(2, '0')}/{String(currentMonth + 1).padStart(2, '0')}/{currentYear}
                                                        <span className={isSunday ? "text-red-500" : "text-slate-400"}>{dayOfWeekStr}</span>
                                                    </span>
                                                    <Icon name="lock" size={14} className="text-slate-400" />
                                                </div>
                                            );
                                        })()}
                                    </div>

                                    {/* Special Days Alert */}
                                    {getEventsForDay(selectedPostDayIdx + 1).length > 0 && (
                                        <div className="bg-purple-50 border border-purple-200 p-4 rounded-xl flex flex-col gap-2">
                                            <span className="text-[9px] font-black text-purple-700 uppercase tracking-widest flex items-center gap-1.5">
                                                <Icon name="star" size={12} className="text-purple-600 fill-purple-600" />
                                                Occurring Holiday Events
                                            </span>
                                            {getEventsForDay(selectedPostDayIdx + 1).map((ev, eIdx) => (
                                                <div key={eIdx} className="text-xs font-bold text-purple-900">
                                                    • {ev.name} <span className="text-[9px] text-purple-500 font-medium">({ev.type})</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Post Details Input */}
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Short Details</label>
                                        <input 
                                            type="text" 
                                            placeholder="Enter short details for this post..." 
                                            className="w-full bg-slate-50 outline-none text-sm font-bold text-slate-700 placeholder-slate-400 focus:ring-2 focus:ring-blue-100 p-4 rounded-xl transition-all shadow-inner border border-slate-200" 
                                            value={((postsData[selectedDay] || [])[selectedPostDayIdx] || {}).text || ""} 
                                            onChange={e => updatePostDetails(selectedPostDayIdx, 'text', e.target.value, `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(selectedPostDayIdx + 1).padStart(2, '0')}`)} 
                                        />
                                    </div>

                                    {/* Meta Controls (Type + Status) */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Post Format</label>
                                            <PostTypeDropdown 
                                                value={((postsData[selectedDay] || [])[selectedPostDayIdx] || {}).type || "Static"} 
                                                onChange={(val) => updatePostDetails(selectedPostDayIdx, 'type', val, `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(selectedPostDayIdx + 1).padStart(2, '0')}`)} 
                                                isLast={false}
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Workflow Status</label>
                                            <button 
                                                onClick={() => {
                                                    const currentStatus = ((postsData[selectedDay] || [])[selectedPostDayIdx] || {}).status || 'todo';
                                                    updatePostDetails(selectedPostDayIdx, 'status', cyclePostStatus(currentStatus), `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(selectedPostDayIdx + 1).padStart(2, '0')}`);
                                                }}
                                                className={`w-full py-3.5 rounded-xl text-xs font-black tracking-widest uppercase border btn-interact select-none flex items-center justify-center gap-2 ${
                                                    ((postsData[selectedDay] || [])[selectedPostDayIdx] || {}).status === 'published' 
                                                        ? 'bg-green-500 text-white border-green-600 shadow-md shadow-green-100' 
                                                        : ((postsData[selectedDay] || [])[selectedPostDayIdx] || {}).status === 'in-progress' 
                                                            ? 'bg-yellow-400 text-yellow-950 border-yellow-500 shadow-md shadow-yellow-50' 
                                                            : 'bg-slate-100 text-slate-500 hover:bg-slate-200 border-slate-200'
                                                }`}
                                            >
                                                <Icon name={
                                                    ((postsData[selectedDay] || [])[selectedPostDayIdx] || {}).status === 'published' 
                                                        ? 'check-circle' 
                                                        : ((postsData[selectedDay] || [])[selectedPostDayIdx] || {}).status === 'in-progress' 
                                                            ? 'loader' 
                                                            : 'circle'
                                                } size={14} className={((postsData[selectedDay] || [])[selectedPostDayIdx] || {}).status === 'in-progress' ? 'animate-spin' : ''} />
                                                {(((postsData[selectedDay] || [])[selectedPostDayIdx] || {}).status || 'todo').replace('-', ' ')}
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-end">
                                    <button 
                                        onClick={() => setSelectedPostDayIdx(null)}
                                        className="bg-slate-900 text-white font-black tracking-widest uppercase text-[10px] px-8 py-3.5 rounded-xl hover:bg-slate-800 btn-interact shadow-lg"
                                    >
                                        Done Saving
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Mobile Navigation bar */}
                    <footer className="lg:hidden fixed bottom-0 left-0 right-0 glass-effect px-4 py-3 z-50 flex justify-between items-center border-t border-slate-200 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
                        <div className="flex gap-1 overflow-x-auto no-scrollbar max-w-full">
                            {displayDays.map(d => (
                                <button 
                                    key={d} 
                                    onClick={() => { setSelectedDay(d); setActiveInnerTab('pipeline'); }} 
                                    className={`flex flex-col items-center justify-center px-4 py-2 rounded-xl transition-all min-w-max ${
                                        selectedDay === d 
                                        ? (d === 'Master' || d === 'Calendar' ? 'bg-slate-900 text-white shadow-md scale-105' : 'bg-blue-600 text-white shadow-md scale-105') 
                                        : 'bg-white border border-slate-100 text-slate-400 hover:bg-slate-50'
                                    }`}
                                >
                                    <span className="text-[10px] font-black uppercase tracking-wider">{d.substring(0,3)}</span>
                                    <span className="text-[8px] font-semibold opacity-85 mt-0.5 max-w-[50px] truncate">
                                        {clientsData[d].name.split(' (')[0]}
                                    </span>
                                </button>
                            ))}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
