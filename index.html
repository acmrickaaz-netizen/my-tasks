<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICKAAZ | Production Master</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running the app in the browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .btn-interact { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-interact:active { transform: scale(0.95); }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        @keyframes savePulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .animate-save {
            animation: savePulse 1.5s infinite;
        }

        /* Customizing the date input to fit the theme */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- Firebase Configuration Logic ---
        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try {
                    return JSON.parse(__firebase_config);
                } catch (e) {
                    console.error("Failed to parse environment config:", e);
                }
            }
            return {
                apiKey: "AIzaSyAfAKZ-WDJo2qb9FOu0u0NyaNig5V04ofg",
                authDomain: "production-master-dashboard.firebaseapp.com",
                projectId: "production-master-dashboard",
                storageBucket: "production-master-dashboard.firebasestorage.app",
                messagingSenderId: "444022330801",
                appId: "1:444022330801:web:bda76dc5ed3b8cab511990"
            };
        };

        const config = getFirebaseConfig();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'production-master-custom';

        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Smart Link Preview Component ---
        const IdeaLinkPreview = ({ url, domain }) => {
            const [imageUrl, setImageUrl] = useState(null);

            useEffect(() => {
                const fetchPreview = async () => {
                    try {
                        // Using Microlink API to extract Open Graph images from the pasted URL
                        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                        const data = await res.json();
                        if (data.status === 'success' && data.data?.image?.url) {
                            setImageUrl(data.data.image.url);
                        }
                    } catch (e) {
                        console.error("Failed to fetch link preview", e);
                    }
                };
                if (url) fetchPreview();
            }, [url]);

            // If we successfully grabbed the actual post image
            if (imageUrl) {
                return (
                    <a href={url} target="_blank" rel="noopener noreferrer" className="relative block w-20 h-20 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all hover:border-blue-400 hover:scale-105 border border-slate-200 flex-shrink-0 bg-slate-100 group/preview" title="Open Link">
                        <img src={imageUrl} alt="Link Preview" className="w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-black/0 group-hover/preview:bg-black/20 transition-all flex items-center justify-center">
                            <Icon name="external-link" size={20} className="text-white opacity-0 group-hover/preview:opacity-100 drop-shadow-md" />
                        </div>
                    </a>
                );
            }

            // Fallback: If no image found or scraping is blocked (e.g. strict Facebook links), show High-Res Favicon
            return (
                <a href={url} target="_blank" rel="noopener noreferrer" className="hidden sm:flex flex-col items-center justify-center w-20 h-20 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-400 hover:shadow-md transition-all flex-shrink-0 hover:scale-105" title="Open Link">
                    <img src={`https://www.google.com/s2/favicons?domain=${domain}&sz=128`} alt={domain} className="w-8 h-8 mb-1.5 object-contain opacity-80" />
                    <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest truncate w-16 text-center">{domain.replace('www.', '')}</span>
                </a>
            );
        };

        // --- Custom Dropdown Component for Post Types ---
        const PostTypeDropdown = ({ value, onChange, isLast }) => {
            const [isOpen, setIsOpen] = useState(false);
            const options = [
                { id: 'Static', icon: 'image', label: 'Static' },
                { id: 'Video', icon: 'video', label: 'Video' },
                { id: 'Carousel', icon: 'layers', label: 'Carousel' }
            ];

            const currentOption = options.find(o => o.id === value) || options[0];

            return (
                <div className="relative w-full md:w-[140px] flex-shrink-0">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full bg-slate-50 border border-slate-100 outline-none text-xs font-bold text-slate-700 px-4 py-3.5 rounded-xl transition-all cursor-pointer shadow-sm flex items-center justify-between gap-2 hover:bg-white focus:ring-2 focus:ring-blue-100"
                    >
                        <div className="flex items-center gap-2.5">
                            <Icon name={currentOption.icon} size={14} className="text-blue-500" />
                            {currentOption.label}
                        </div>
                        <Icon name="chevron-down" size={14} className="text-slate-400" />
                    </button>
                    
                    {isOpen && (
                        <>
                            <div className="fixed inset-0 z-[50]" onClick={() => setIsOpen(false)}></div>
                            <div className={`absolute left-0 w-full bg-white border border-slate-100 rounded-xl shadow-2xl z-[60] overflow-hidden flex flex-col py-1 ${isLast ? 'bottom-full mb-2' : 'top-full mt-2'}`}>
                                {options.map(opt => (
                                    <button
                                        key={opt.id}
                                        onClick={() => { onChange(opt.id); setIsOpen(false); }}
                                        className="w-full text-left px-4 py-3 text-xs font-bold text-slate-600 hover:bg-slate-50 flex items-center gap-2.5 transition-all"
                                    >
                                        <Icon name={opt.icon} size={14} className={value === opt.id ? "text-blue-600" : "text-slate-400"} />
                                        <span className={value === opt.id ? "text-slate-900" : ""}>{opt.label}</span>
                                    </button>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [authStatus, setAuthStatus] = useState('connecting');
            const [errorMessage, setErrorMessage] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // Content State
            const [completedTasks, setCompletedTasks] = useState([]);
            const [ideas, setIdeas] = useState({});
            const [resources, setResources] = useState({});
            const [postsData, setPostsData] = useState({}); // State for the 5 daily posts

            const clientsData = useMemo(() => ({
                Monday: { name: "Universal Holidays (UK)", focus: "High-end travel flyers & holiday package graphics." },
                Tuesday: { name: "Fly Universal (UK)", focus: "Last Minute deal templates & flight route maps." },
                Wednesday: { name: "Airfleet Limo (Canada)", focus: "Professional fleet showcases & service area highlights." },
                Thursday: { name: "Tours Coach (Canada)", focus: "Group travel imagery & event-based transport ads." },
                Friday: { name: "Ideal Hajj & Umrah (UK)", focus: "Spiritual guides, package details, & religious iconography." },
                Saturday: { name: "Maintenance", focus: "Weekly review and planning." },
                Sunday: { name: "Rest", focus: "Recharge for next week." }
            }), []);

            const vaultTabs = [
                { id: "Universal Holidays (UK)", label: "Univ Hol" },
                { id: "Fly Universal (UK)", label: "Fly Univ" },
                { id: "Airfleet Limo (Canada)", label: "Airfleet" },
                { id: "Tours Coach (Canada)", label: "Tours" },
                { id: "Ideal Hajj & Umrah (UK)", label: "Ideal Hajj" },
                { id: "Global Strategy", label: "Global" }
            ];

            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const actualToday = days[new Date().getDay()];
            const [selectedDay, setSelectedDay] = useState(actualToday);
            const currentClient = clientsData[selectedDay];
            const [selectedIdeaClient, setSelectedIdeaClient] = useState(currentClient.name || "Global Strategy");
            const [newIdea, setNewIdea] = useState("");

            // Auto-sync Idea Vault tab to the currently selected Day
            useEffect(() => {
                const clientName = clientsData[selectedDay].name;
                if (clientName === "Maintenance" || clientName === "Rest") {
                    setSelectedIdeaClient("Global Strategy");
                } else {
                    setSelectedIdeaClient(clientName);
                }
            }, [selectedDay, clientsData]);

            useEffect(() => {
                const initAuth = async () => { 
                    try { 
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { 
                        console.error("Auth Error:", e);
                        setAuthStatus('error');
                        setErrorMessage("Auth failed: " + e.message);
                    } 
                };
                initAuth();
                return auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) {
                        setAuthStatus('connected');
                        setErrorMessage(null);
                    }
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `/artifacts/${appId}/users/${user.uid}/productionData/current`;
                const docRef = db.doc(path);
                
                const unsubscribe = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        if (data.ideas) setIdeas(data.ideas);
                        if (data.completedTasks) setCompletedTasks(data.completedTasks);
                        if (data.resources) setResources(data.resources);
                        if (data.postsData) setPostsData(data.postsData);
                    }
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setErrorMessage("Database access denied. Check Firebase Rules.");
                });

                return () => unsubscribe();
            }, [user, actualToday]);

            const syncToCloud = useCallback(async (updates) => {
                if (!user) {
                    setErrorMessage("Error: Disconnected. Sign-in required.");
                    return;
                }
                setIsSyncing(true);
                const path = `/artifacts/${appId}/users/${user.uid}/productionData/current`;
                const docRef = db.doc(path);
                try { 
                    await docRef.set(updates, { merge: true }); 
                    setErrorMessage(null);
                } catch (e) {
                    console.error("Save Error:", e);
                    setErrorMessage("Save failed: " + e.message);
                } finally { 
                    setIsSyncing(false); 
                }
            }, [user]);

            const updateResource = (clientName, field, value) => {
                const updatedResources = { ...resources, [clientName]: { ...(resources[clientName] || {}), [field]: value } };
                setResources(updatedResources);
                syncToCloud({ resources: updatedResources });
            };

            const toggleTask = (taskId) => {
                const daySpecificId = `${selectedDay}-${taskId}`;
                const updated = completedTasks.includes(daySpecificId) 
                    ? completedTasks.filter(t => t !== daySpecificId) 
                    : [...completedTasks, daySpecificId];
                setCompletedTasks(updated);
                syncToCloud({ completedTasks: updated });
            };

            const addIdea = (e) => {
                e.preventDefault();
                if (!newIdea.trim()) return;
                const updatedIdeas = { 
                    ...ideas, 
                    [selectedIdeaClient]: [...(ideas[selectedIdeaClient] || []), { id: Date.now(), text: newIdea }] 
                };
                setIdeas(updatedIdeas);
                syncToCloud({ ideas: updatedIdeas });
                setNewIdea("");
            };

            const removeIdea = (clientKey, id) => {
                const updated = { ...ideas, [clientKey] : (ideas[clientKey] || []).filter(i => i.id !== id) };
                setIdeas(updated);
                syncToCloud({ ideas: updated });
            };

            // Post Pipeline Functions
            const cyclePostStatus = (status) => {
                if (status === 'todo') return 'in-progress';
                if (status === 'in-progress') return 'published';
                return 'todo';
            };

            const updatePostDetails = (index, field, value) => {
                const defaultPosts = [
                    { text: "", status: "todo", type: "Static", date: "" }, 
                    { text: "", status: "todo", type: "Static", date: "" },
                    { text: "", status: "todo", type: "Static", date: "" }, 
                    { text: "", status: "todo", type: "Static", date: "" },
                    { text: "", status: "todo", type: "Static", date: "" }
                ];
                const dayPosts = postsData[selectedDay] ? [...postsData[selectedDay]] : defaultPosts;
                
                while(dayPosts.length < 5) dayPosts.push({ text: "", status: "todo", type: "Static", date: "" });

                dayPosts[index] = { ...dayPosts[index], [field]: value };
                const newPostsData = { ...postsData, [selectedDay]: dayPosts };
                
                setPostsData(newPostsData);
                syncToCloud({ postsData: newPostsData });
            };

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const clientRes = resources[currentClient.name] || { colors: "", link: "", hashtags: "" };

            // Helper function to turn URLs in idea text into clickable links
            const renderTextWithLinks = (text) => {
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const parts = text.split(urlRegex);
                return parts.map((part, i) => {
                    if (part.match(urlRegex)) {
                        return (
                            <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:text-blue-800 underline transition-colors break-all">
                                {part}
                            </a>
                        );
                    }
                    return <span key={i} className="break-words">{part}</span>;
                });
            };

            return (
                <div className="min-h-screen pb-24 bg-slate-50">
                    {errorMessage && (
                        <div className="bg-red-600 text-white text-[10px] font-black text-center py-2 uppercase tracking-[0.2em] sticky top-0 z-[60] shadow-lg animate-pulse">
                            <Icon name="alert-triangle" size={12} className="inline mr-2" /> {errorMessage}
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex flex-col items-center md:items-start">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-600 p-2 rounded-xl text-white shadow-md">
                                        <Icon name="check-square" size={20} />
                                    </div>
                                    <h1 className="text-3xl font-[900] text-slate-900 tracking-tighter leading-none">DAILY TASKS</h1>
                                </div>
                                <div className="flex items-center gap-2 mt-2 ml-1">
                                    <span className="h-0.5 w-8 bg-blue-600 rounded-full"></span>
                                    <p className="text-[10px] font-extrabold text-slate-400 uppercase tracking-[0.3em]">Production Master</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-6">
                                <div className="hidden md:flex flex-col items-end">
                                    <p className="text-[9px] font-black text-blue-600 uppercase tracking-widest">{currentTime.toLocaleDateString('en-GB', { weekday: 'long' })}</p>
                                    <p className="text-xs font-bold text-slate-400">{currentTime.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}</p>
                                </div>
                                <div className="bg-slate-900 px-5 py-2.5 rounded-xl shadow-lg border border-slate-800">
                                    <p className="text-xl font-mono font-black text-white tabular-nums tracking-tight">
                                        {currentTime.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 py-10 space-y-10">
                        {/* COMPACT LIVE SESSION BANNER AT TOP */}
                        <section className="bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-[2rem] px-8 py-6 shadow-xl relative overflow-hidden group border border-slate-700 flex flex-col md:flex-row md:items-center justify-between gap-4 w-full">
                            <div className="absolute -top-16 -right-6 opacity-5 group-hover:scale-110 group-hover:-rotate-6 transition-all duration-1000 pointer-events-none">
                                <Icon name="rocket" size={200} />
                            </div>
                            <div className="relative z-10 flex flex-col md:flex-row md:items-center gap-4 md:gap-8 w-full">
                                <div className="min-w-max">
                                    <h2 className="text-[10px] font-black text-blue-400 uppercase mb-2 tracking-[0.4em]">Live Session</h2>
                                    <h3 className="text-2xl font-[800] tracking-tight leading-none">{currentClient.name}</h3>
                                </div>
                                <div className="hidden md:block w-px h-10 bg-slate-700 opacity-50"></div>
                                <div className="flex-1 bg-white/5 md:bg-transparent p-4 md:p-0 rounded-xl md:rounded-none border border-white/10 md:border-transparent">
                                    <p className="text-sm italic font-medium leading-relaxed text-slate-300">"{currentClient.focus}"</p>
                                </div>
                            </div>
                        </section>

                        {/* POST PIPELINE - NOW FULL WIDTH AT THE TOP */}
                        <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl w-full">
                            <div className="px-8 py-6 border-b border-slate-100 bg-blue-50/50 flex flex-col md:flex-row md:items-center justify-between gap-4 rounded-t-[2.5rem]">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-md"><Icon name="layers" size={20} /></div>
                                    <div>
                                        <h2 className="font-black text-slate-900 text-xl tracking-tighter uppercase">Daily Post Pipeline</h2>
                                        <p className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Track & Detail 5 Posts for {selectedDay}</p>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Row-by-Row Layout for Desktop & Mobile */}
                            <div className="p-6 flex flex-col gap-4 bg-slate-50/30 rounded-b-[2.5rem]">
                                {[0, 1, 2, 3, 4].map(i => {
                                    const defaultPost = { text: "", status: "todo", type: "Static", date: "" };
                                    const post = (postsData[selectedDay] || [])[i] || defaultPost;
                                    
                                    let statusClasses = "bg-slate-200 text-slate-500 hover:bg-slate-300";
                                    let statusText = "TODO";
                                    let statusIcon = "circle";
                                    
                                    if (post.status === 'in-progress') {
                                        statusClasses = "bg-yellow-400 text-yellow-950 hover:bg-yellow-500 shadow-md";
                                        statusText = "IN PROGRESS";
                                        statusIcon = "loader";
                                    } else if (post.status === 'published') {
                                        statusClasses = "bg-green-500 text-white hover:bg-green-600 shadow-md";
                                        statusText = "PUBLISHED";
                                        statusIcon = "check-circle";
                                    }

                                    return (
                                        <div key={i} className="flex flex-col md:flex-row items-center gap-3 lg:gap-4 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm transition-all hover:border-blue-400 hover:shadow-md relative">
                                            <div className="w-12 h-12 rounded-xl bg-slate-50 text-slate-400 font-black flex items-center justify-center shadow-inner text-lg flex-shrink-0 border border-slate-100">
                                                {i + 1}
                                            </div>
                                            
                                            {/* Custom Dropdown for Post Type - isLast prop makes bottom rows open upwards */}
                                            <PostTypeDropdown 
                                                value={post.type || "Static"} 
                                                onChange={(val) => updatePostDetails(i, 'type', val)} 
                                                isLast={i >= 3}
                                            />

                                            {/* Date Picker */}
                                            <input 
                                                type="date" 
                                                className="w-full md:w-[130px] bg-slate-50 border border-slate-100 outline-none text-[11px] font-bold text-slate-600 focus:ring-2 focus:ring-blue-100 px-3 py-4 rounded-xl transition-all shadow-inner flex-shrink-0"
                                                value={post.date || ""} 
                                                onChange={e => updatePostDetails(i, 'date', e.target.value)} 
                                            />

                                            <input 
                                                type="text" 
                                                placeholder="Enter short details for this post..." 
                                                className="flex-1 w-full bg-slate-50 outline-none text-sm font-bold text-slate-700 placeholder-slate-400 focus:ring-2 focus:ring-blue-100 p-4 rounded-xl transition-all shadow-inner" 
                                                value={post.text} 
                                                onChange={e => updatePostDetails(i, 'text', e.target.value)} 
                                            />
                                            
                                            <button 
                                                onClick={() => updatePostDetails(i, 'status', cyclePostStatus(post.status))} 
                                                className={`px-6 py-4 rounded-xl text-[10px] font-black tracking-widest uppercase transition-all flex items-center justify-center gap-2 btn-interact flex-shrink-0 w-full md:w-[160px] ${statusClasses}`}
                                            >
                                                <Icon name={statusIcon} size={16} className={post.status === 'in-progress' ? 'animate-spin' : ''} />
                                                {statusText}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* GRID FOR THE REMAINING SECTIONS */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            
                            {/* LEFT COLUMN */}
                            <div className="lg:col-span-4 space-y-8">
                                <section className="bg-white rounded-[2rem] p-8 border border-slate-200 shadow-sm">
                                    <h2 className="font-black text-slate-900 mb-6 flex items-center gap-3 uppercase tracking-tighter text-sm"><Icon name="paperclip" className="text-blue-600" /> Resources</h2>
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] block mb-3">Color Palette</label>
                                            <div className="flex gap-2 flex-wrap mb-4">
                                                {clientRes.colors.split(',').map((c, i) => c.trim().startsWith('#') && <div key={i} className="w-10 h-10 rounded-2xl border-2 border-white shadow-md" style={{ backgroundColor: c.trim() }} />)}
                                            </div>
                                            <input type="text" placeholder="#HEX, #HEX" className="w-full text-[10px] bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-100 font-mono" value={clientRes.colors} onChange={(e) => updateResource(currentClient.name, 'colors', e.target.value)} />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] block mb-3">Google Drive</label>
                                            <div className="flex gap-2">
                                                <input type="text" placeholder="Folder URL..." className="flex-1 text-[10px] bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none" value={clientRes.link} onChange={(e) => updateResource(currentClient.name, 'link', e.target.value)} />
                                                {clientRes.link && <a href={clientRes.link} target="_blank" className="p-3 bg-blue-600 text-white rounded-xl shadow-lg"><Icon name="external-link" size={18} /></a>}
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            {/* RIGHT COLUMN */}
                            <div className="lg:col-span-8 space-y-10">
                                
                                {/* WORKFLOW BLOCKS */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="bg-orange-500 p-6 flex justify-between items-center text-white">
                                            <h2 className="font-black uppercase tracking-tight text-sm flex items-center gap-3"><Icon name="sun" /> Morning</h2>
                                            <span className="text-[10px] font-black opacity-60 uppercase tracking-widest">07:30</span>
                                        </div>
                                        <div className="p-8 space-y-4">
                                            {["Caption Drafting", "Topic Research", "Resize Assets"].map((task, i) => {
                                                const isDone = completedTasks.includes(`${selectedDay}-m${i}`);
                                                return (
                                                    <div key={i} onClick={() => toggleTask(`m${i}`)} className={`flex items-center gap-5 p-5 rounded-2xl border-2 cursor-pointer transition-all ${isDone ? 'bg-slate-50 border-transparent opacity-50' : 'bg-white border-slate-50 hover:border-orange-200'}`}>
                                                        {isDone ? <Icon name="check-circle" className="text-green-500" /> : <Icon name="circle" className="text-slate-200" />}
                                                        <span className={`text-sm font-bold ${isDone ? 'line-through text-slate-400' : 'text-slate-800'}`}>{task}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="bg-indigo-600 p-6 flex justify-between items-center text-white">
                                            <h2 className="font-black uppercase tracking-tight text-sm flex items-center gap-3"><Icon name="moon" /> Night Forge</h2>
                                            <span className="text-[10px] font-black opacity-60 uppercase tracking-widest">20:00</span>
                                        </div>
                                        <div className="p-8 space-y-4">
                                            {["Visual Design Phase", "Scheduling & Sync"].map((task, i) => {
                                                const isDone = completedTasks.includes(`${selectedDay}-n${i}`);
                                                return (
                                                    <div key={i} onClick={() => toggleTask(`n${i}`)} className={`flex items-center gap-5 p-5 rounded-2xl border-2 cursor-pointer transition-all ${isDone ? 'bg-slate-50 border-transparent opacity-50' : 'bg-white border-slate-50 hover:border-indigo-200'}`}>
                                                        {isDone ? <Icon name="check-circle" className="text-green-500" /> : <Icon name="circle" className="text-slate-200" />}
                                                        <span className={`text-sm font-bold ${isDone ? 'line-through text-slate-400' : 'text-slate-800'}`}>{task}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>

                        {/* IDEA VAULT - NOW FULL WIDTH AT THE BOTTOM */}
                        <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden border-l-[12px] border-l-yellow-400 w-full">
                            <div className="px-10 py-8 border-b border-slate-100 bg-yellow-400/5 flex flex-col md:flex-row md:items-center justify-between gap-8">
                                <div className="flex items-center gap-4">
                                    <div className="bg-yellow-400 p-3 rounded-2xl text-yellow-900 shadow-inner"><Icon name="lightbulb" size={24} /></div>
                                    <div>
                                        <h2 className="font-black text-slate-900 text-2xl tracking-tighter uppercase">Idea Vault</h2>
                                        <p className="text-[10px] font-bold text-yellow-600 uppercase tracking-widest">Global Brainstorming</p>
                                    </div>
                                </div>
                                
                                <div className="flex gap-1.5 overflow-x-auto no-scrollbar py-1">
                                    {vaultTabs.map(tab => (
                                        <button 
                                            key={tab.id} 
                                            onClick={() => setSelectedIdeaClient(tab.id)} 
                                            className={`whitespace-nowrap px-4 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${selectedIdeaClient === tab.id ? 'bg-slate-900 text-white shadow-xl scale-105' : 'bg-white text-slate-400 border border-slate-100 hover:border-slate-300'}`}
                                        >
                                            {tab.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="p-10">
                                <form onSubmit={addIdea} className="flex gap-4 mb-10">
                                    <input type="text" value={newIdea} onChange={(e) => setNewIdea(e.target.value)} placeholder={`Drop a creative spark for ${selectedIdeaClient.split(' ')[0]}...`} className="flex-1 bg-slate-50 border border-slate-200 rounded-[1.5rem] px-8 py-5 text-sm outline-none focus:ring-4 focus:ring-yellow-400/10 font-bold" />
                                    <button type="submit" className="bg-yellow-400 text-yellow-950 font-black px-10 py-5 rounded-[1.5rem] text-[11px] tracking-widest uppercase hover:bg-yellow-500 btn-interact shadow-xl shadow-yellow-100">Store</button>
                                </form>
                                
                                {/* Updated to full width layout with text wrapping for long URLs */}
                                <div className="flex flex-col gap-4 max-h-[500px] overflow-y-auto pr-4 custom-scrollbar">
                                    {(ideas[selectedIdeaClient] || []).length > 0 ? (
                                        (ideas[selectedIdeaClient] || []).map(idea => {
                                            
                                            // Extract URL from the text to generate the thumbnail
                                            const urlMatch = idea.text.match(/(https?:\/\/[^\s]+)/);
                                            const firstUrl = urlMatch ? urlMatch[0] : null;
                                            let domain = "";
                                            if (firstUrl) {
                                                try { domain = new URL(firstUrl).hostname; } catch(e) {}
                                            }

                                            return (
                                                <div key={idea.id} className="group flex justify-between items-center gap-4 p-5 md:p-6 bg-slate-50 rounded-[1.5rem] border border-slate-100 hover:border-yellow-400 hover:bg-white transition-all shadow-sm">
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-sm text-slate-800 font-bold leading-relaxed">
                                                            {renderTextWithLinks(idea.text)}
                                                        </p>
                                                    </div>
                                                    
                                                    <div className="flex items-center gap-4 flex-shrink-0">
                                                        {/* Smart Thumbnail Preview */}
                                                        {firstUrl && domain && (
                                                            <IdeaLinkPreview url={firstUrl} domain={domain} />
                                                        )}
                                                        
                                                        {/* Trash button hidden until hovered (visible on mobile) */}
                                                        <button onClick={() => removeIdea(selectedIdeaClient, idea.id)} className="opacity-100 lg:opacity-0 lg:group-hover:opacity-100 text-slate-400 hover:text-red-500 transition-all p-3 bg-white rounded-xl shadow-sm border border-slate-100 flex-shrink-0 hover:bg-red-50">
                                                            <Icon name="trash-2" size={18} />
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    ) : (
                                        <div className="py-20 text-center border-4 border-dashed border-slate-50 rounded-[2.5rem]">
                                            <Icon name="inbox" className="mx-auto text-slate-200 mb-4" size={48} />
                                            <p className="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em]">Vault is currently empty</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 glass-effect px-6 py-4 z-50 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-full shadow-lg">
                                <div className={`w-2.5 h-2.5 rounded-full shadow-sm ${
                                    authStatus === 'connected' ? (isSyncing ? 'bg-yellow-400 animate-save' : 'bg-green-500') : 
                                    authStatus === 'error' ? 'bg-red-500' : 'bg-slate-500 animate-pulse'
                                }`}></div>
                                <span className="text-[9px] font-black uppercase tracking-[0.2em]">
                                    {authStatus === 'connected' ? (isSyncing ? 'Syncing...' : 'Live & Synced') : 
                                     authStatus === 'error' ? 'Sync Error' : 'Connecting...'}
                                </span>
                            </div>
                        </div>
                        
                        <div className="flex gap-1.5 overflow-x-auto no-scrollbar max-w-full">
                            {days.map(d => (
                                <button 
                                    key={d} 
                                    onClick={() => setSelectedDay(d)} 
                                    className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${selectedDay === d ? 'bg-blue-600 text-white shadow-xl shadow-blue-100 scale-105' : 'bg-white text-slate-400 border border-slate-100 hover:bg-slate-50'}`}
                                >
                                    {d}
                                </button>
                            ))}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
