<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICKAAZ | Production Master</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running the app in the browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; /* slate-50 */
            overflow: hidden; /* App container handles scrolling */
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: #94a3b8; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .btn-interact { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-interact:active { transform: scale(0.96); }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes savePulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-save { animation: savePulse 1s infinite; }

        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try { return JSON.parse(__firebase_config); } catch (e) {}
            }
            return {
                apiKey: "AIzaSyAfAKZ-WDJo2qb9FOu0u0NyaNig5V04ofg",
                authDomain: "production-master-dashboard.firebaseapp.com",
                projectId: "production-master-dashboard",
                storageBucket: "production-master-dashboard.firebasestorage.app",
                messagingSenderId: "444022330801",
                appId: "1:444022330801:web:bda76dc5ed3b8cab511990"
            };
        };

        const config = getFirebaseConfig();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'production-master-custom';

        if (!firebase.apps.length) firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const parseEventDay = (dateStr, year, monthIndex) => {
            const exactMatch = dateStr.match(/^[A-Za-z]{3}\s(\d+)/);
            if (exactMatch) return parseInt(exactMatch[1], 10);
            
            const nthMatch = dateStr.match(/^(1st|2nd|3rd|4th)\s(Mon|Tue|Wed|Thu|Fri|Sat|Sun)/);
            if (nthMatch) {
                const nthMap = { "1st": 1, "2nd": 2, "3rd": 3, "4th": 4 };
                const dayMap = { "Sun": 0, "Mon": 1, "Tue": 2, "Wed": 3, "Thu": 4, "Fri": 5, "Sat": 6 };
                const targetN = nthMap[nthMatch[1]];
                const targetD = dayMap[nthMatch[2]];
                let count = 0;
                for (let i = 1; i <= 31; i++) {
                    const d = new Date(year, monthIndex, i);
                    if (d.getMonth() !== monthIndex) break;
                    if (d.getDay() === targetD) {
                        count++;
                        if (count === targetN) return i;
                    }
                }
            }
            return null;
        };

        const IdeaLinkPreview = ({ url, domain }) => {
            const [imageUrl, setImageUrl] = useState(null);
            useEffect(() => {
                const fetchPreview = async () => {
                    try {
                        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                        const data = await res.json();
                        if (data.status === 'success' && data.data?.image?.url) setImageUrl(data.data.image.url);
                    } catch (e) {}
                };
                if (url) fetchPreview();
            }, [url]);

            if (imageUrl) {
                return (
                    <a href={url} target="_blank" rel="noopener noreferrer" className="relative block w-16 h-16 md:w-20 md:h-20 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all hover:ring-2 hover:ring-blue-400 flex-shrink-0 bg-slate-100 group/preview" title="Open Link">
                        <img src={imageUrl} alt="Preview" className="w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-black/0 group-hover/preview:bg-black/20 transition-all flex items-center justify-center">
                            <Icon name="external-link" size={16} className="text-white opacity-0 group-hover/preview:opacity-100 drop-shadow-md" />
                        </div>
                    </a>
                );
            }
            return (
                <a href={url} target="_blank" rel="noopener noreferrer" className="hidden sm:flex flex-col items-center justify-center w-16 h-16 md:w-20 md:h-20 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-blue-400 hover:shadow-md transition-all flex-shrink-0" title="Open Link">
                    <img src={`https://www.google.com/s2/favicons?domain=${domain}&sz=64`} alt={domain} className="w-6 h-6 md:w-8 md:h-8 mb-1 object-contain opacity-80" />
                    <span className="text-[8px] font-bold text-slate-400 uppercase tracking-widest truncate w-full px-2 text-center">{domain.replace('www.', '')}</span>
                </a>
            );
        };

        const PostTypeDropdown = ({ value, onChange, isLast }) => {
            const [isOpen, setIsOpen] = useState(false);
            const options = [
                { id: 'Static', icon: 'image', label: 'Static' },
                { id: 'Video', icon: 'video', label: 'Video' },
                { id: 'Carousel', icon: 'layers', label: 'Carousel' }
            ];
            const currentOption = options.find(o => o.id === value) || options[0];

            return (
                <div className="relative w-full md:w-[130px] flex-shrink-0">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full bg-white border border-slate-200 outline-none text-xs font-semibold text-slate-700 px-3 py-3 md:py-4 rounded-xl transition-all shadow-sm flex items-center justify-between hover:border-blue-300 focus:ring-2 focus:ring-blue-100"
                    >
                        <div className="flex items-center gap-2">
                            <Icon name={currentOption.icon} size={14} className="text-blue-500" />
                            {currentOption.label}
                        </div>
                        <Icon name="chevron-down" size={14} className="text-slate-400" />
                    </button>
                    {isOpen && (
                        <>
                            <div className="fixed inset-0 z-40" onClick={() => setIsOpen(false)}></div>
                            <div className={`absolute left-0 w-full bg-white border border-slate-100 rounded-xl shadow-xl z-50 overflow-hidden py-1 ${isLast ? 'bottom-full mb-1' : 'top-full mt-1'}`}>
                                {options.map(opt => (
                                    <button key={opt.id} onClick={() => { onChange(opt.id); setIsOpen(false); }} className="w-full text-left px-4 py-2.5 text-xs font-semibold text-slate-600 hover:bg-slate-50 flex items-center gap-2.5 transition-colors">
                                        <Icon name={opt.icon} size={14} className={value === opt.id ? "text-blue-600" : "text-slate-400"} />
                                        <span className={value === opt.id ? "text-slate-900 font-bold" : ""}>{opt.label}</span>
                                    </button>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [authStatus, setAuthStatus] = useState('connecting');
            const [errorMessage, setErrorMessage] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            
            // Layout State
            const [activeInnerTab, setActiveInnerTab] = useState('pipeline'); // 'pipeline', 'vault', 'competitors', 'resources'
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            // Date State
            const [currentDateObj, setCurrentDateObj] = useState(new Date());
            const currentYear = currentDateObj.getFullYear();
            const currentMonth = currentDateObj.getMonth();
            const currentDayOfMonth = currentDateObj.getDate();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const monthName = currentDateObj.toLocaleString('default', { month: 'long' });
            
            const monthWeeks = useMemo(() => {
                const weeks = [];
                for (let i = 0; i < daysInMonth; i += 7) {
                    weeks.push({ title: `Week ${weeks.length + 1}`, start: i, count: Math.min(7, daysInMonth - i) });
                }
                return weeks;
            }, [daysInMonth]);

            const calendarEvents = useMemo(() => [
                { month: "January", events: [{ date: "Jan 1", name: "New Year's Day", type: "Global" }, { date: "Jan 25", name: "Burns Night", type: "UK" }, { date: "Jan 27", name: "Int. Holocaust Remembrance Day", type: "Global" }] },
                { month: "February", events: [{ date: "Feb 14", name: "Valentine’s Day", type: "Global" }, { date: "3rd Mon", name: "Family Day", type: "Canada" }] },
                { month: "March", events: [{ date: "Mar 1", name: "St. David's Day (Wales)", type: "UK" }, { date: "Mar 8", name: "Int. Women's Day", type: "Global" }, { date: "Mar 9", name: "Commonwealth Day", type: "UK" }, { date: "Mar 15", name: "Mothering Sunday", type: "UK" }, { date: "Mar 17", name: "St. Patrick's Day", type: "UK/Int" }, { date: "Mar 22", name: "World Water Day", type: "Global" }] },
                { month: "April", events: [{ date: "Apr 1", name: "April Fools' Day", type: "Global" }, { date: "Apr 3", name: "Good Friday", type: "UK/Can" }, { date: "Apr 6", name: "Easter Monday", type: "UK/Can" }, { date: "Apr 22", name: "Earth Day", type: "Global" }, { date: "Apr 23", name: "St. George's Day (England)", type: "UK" }] },
                { month: "May", events: [{ date: "May 1", name: "May Day / Labour Day", type: "UK/Int" }, { date: "May 4", name: "Early May Bank Holiday", type: "UK" }, { date: "May 25", name: "Spring Bank Holiday", type: "UK" }, { date: "Varies", name: "Victoria Day", type: "Canada" }] },
                { month: "June", events: [{ date: "Jun 5", name: "World Environment Day", type: "Global" }, { date: "Jun 13", name: "King's Official Birthday", type: "UK" }, { date: "Jun 21", name: "Father's Day", type: "Global" }, { date: "Jun 21", name: "Nat. Indigenous Peoples Day", type: "Canada" }] },
                { month: "July", events: [{ date: "Jul 1", name: "Canada Day", type: "Canada" }, { date: "Jul 13", name: "Orangemen's Day (NI)", type: "UK" }] },
                { month: "August", events: [{ date: "1st Mon", name: "Civic Holiday", type: "Canada" }, { date: "Aug 3", name: "Summer Bank Holiday (Scotland)", type: "UK" }, { date: "Aug 31", name: "August Bank Holiday", type: "UK" }] },
                { month: "September", events: [{ date: "1st Mon", name: "Labour Day", type: "Canada" }, { date: "Sep 30", name: "Truth & Reconciliation Day", type: "Canada" }] },
                { month: "October", events: [{ date: "2nd Mon", name: "Thanksgiving", type: "Canada" }, { date: "Oct 31", name: "Halloween", type: "Global" }] },
                { month: "November", events: [{ date: "Nov 5", name: "Bonfire Night (Guy Fawkes)", type: "UK" }, { date: "Nov 11", name: "Remembrance Day", type: "UK/Can" }, { date: "Nov 30", name: "St. Andrew's Day (Scotland)", type: "UK" }] },
                { month: "December", events: [{ date: "Dec 25", name: "Christmas Day", type: "Global" }, { date: "Dec 26", name: "Boxing Day", type: "UK/Can" }, { date: "Dec 31", name: "New Year's Eve", type: "Global" }] }
            ], []);

            const getEventsForDay = useCallback((dayNum) => {
                const monthData = calendarEvents.find(m => m.month === monthName);
                if (!monthData) return [];
                return monthData.events.filter(ev => parseEventDay(ev.date, currentYear, currentMonth) === dayNum);
            }, [monthName, currentYear, currentMonth, calendarEvents]);

            // App Data State
            const [ideas, setIdeas] = useState({});
            const [resources, setResources] = useState({});
            const [postsData, setPostsData] = useState({});
            const [competitorsData, setCompetitorsData] = useState({});

            const clientsData = useMemo(() => ({
                Master: { name: "Monthly Overview", focus: "Global production status.", icon: "layout-dashboard" },
                Calendar: { name: "Events & Holidays", focus: "UK, Canada & Int. Key Dates.", icon: "calendar-heart" },
                Monday: { name: "Tours Coach (Canada)", focus: "Group travel imagery & event-based ads.", icon: "bus" },
                Tuesday: { name: "Universal Holidays (UK)", focus: "High-end travel flyers & holiday graphics.", icon: "plane" },
                Wednesday: { name: "Tours Coach (Canada)", focus: "Group travel imagery & event-based ads.", icon: "bus" },
                Thursday: { name: "Fly Universal (UK)", focus: "Last Minute deal templates & flight maps.", icon: "plane-takeoff" },
                Friday: { name: "Airfleet Limo (Canada)", focus: "Professional fleet showcases & service areas.", icon: "car" },
                Saturday: { name: "Maintenance", focus: "Weekly review and planning.", icon: "wrench" }
            }), []);

            const vaultTabs = [
                { id: "Universal Holidays (UK)", label: "Univ Hol" },
                { id: "Fly Universal (UK)", label: "Fly Univ" },
                { id: "Airfleet Limo (Canada)", label: "Airfleet" },
                { id: "Tours Coach (Canada)", label: "Tours" },
                { id: "Ideal Hajj & Umrah (UK)", label: "Ideal Hajj" },
                { id: "Global Strategy", label: "Global" }
            ];

            const fullWeekDays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const actualToday = fullWeekDays[new Date().getDay()] === "Sunday" ? "Monday" : fullWeekDays[new Date().getDay()];
            const displayDays = ["Master", "Calendar", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            
            const [selectedDay, setSelectedDay] = useState(actualToday);
            const currentClient = clientsData[selectedDay];
            const [selectedIdeaClient, setSelectedIdeaClient] = useState("Global Strategy");
            const [newIdea, setNewIdea] = useState("");

            useEffect(() => {
                if (selectedDay !== "Master" && selectedDay !== "Calendar") {
                    const clientName = clientsData[selectedDay].name;
                    setSelectedIdeaClient(clientName === "Maintenance" || clientName === "Rest" ? "Global Strategy" : clientName);
                    setActiveInnerTab('pipeline'); // Reset tab on day switch
                    setIsMobileMenuOpen(false); // Close menu on mobile selection
                }
            }, [selectedDay, clientsData]);

            useEffect(() => {
                const initAuth = async () => { 
                    try { 
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                        else await auth.signInAnonymously();
                    } catch (e) { setAuthStatus('error'); setErrorMessage("Auth failed."); } 
                };
                initAuth();
                return auth.onAuthStateChanged((u) => { setUser(u); if (u) { setAuthStatus('connected'); setErrorMessage(null); } });
            }, []);

            useEffect(() => {
                if (!user) return;
                const docRef = db.doc(`/artifacts/${appId}/public/data/dashboard/current`);
                const unsubscribe = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        if (data.ideas) setIdeas(data.ideas);
                        if (data.resources) setResources(data.resources);
                        if (data.postsData) setPostsData(data.postsData);
                        if (data.competitorsData) setCompetitorsData(data.competitorsData);
                    }
                }, () => setErrorMessage("Database access denied."));
                return () => unsubscribe();
            }, [user]);

            // Auto-Scroll behavior for Pipeline Tab
            useEffect(() => {
                if (selectedDay !== 'Master' && selectedDay !== 'Calendar' && activeInnerTab === 'pipeline') {
                    setTimeout(() => {
                        const todayRow = document.getElementById(`day-row-${currentDayOfMonth}`);
                        if (todayRow) todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 150);
                }
            }, [selectedDay, activeInnerTab, currentDayOfMonth]);

            const syncToCloud = useCallback(async (updates) => {
                if (!user) return setErrorMessage("Sign-in required.");
                setIsSyncing(true);
                try { 
                    await db.doc(`/artifacts/${appId}/public/data/dashboard/current`).set(updates, { merge: true }); 
                    setErrorMessage(null);
                } catch (e) { setErrorMessage("Save failed."); } 
                finally { setIsSyncing(false); }
            }, [user]);

            const updateResource = (clientName, field, value) => {
                const updated = { ...resources, [clientName]: { ...(resources[clientName] || {}), [field]: value } };
                setResources(updated); syncToCloud({ resources: updated });
            };

            const addIdea = (e) => {
                e.preventDefault(); if (!newIdea.trim()) return;
                const updated = { ...ideas, [selectedIdeaClient]: [...(ideas[selectedIdeaClient] || []), { id: Date.now(), text: newIdea }] };
                setIdeas(updated); syncToCloud({ ideas: updated }); setNewIdea("");
            };

            const removeIdea = (clientKey, id) => {
                const updated = { ...ideas, [clientKey]: (ideas[clientKey] || []).filter(i => i.id !== id) };
                setIdeas(updated); syncToCloud({ ideas: updated });
            };

            const cyclePostStatus = (status) => status === 'todo' ? 'in-progress' : status === 'in-progress' ? 'published' : 'todo';

            const updatePostDetails = (index, field, value, specificDateStr) => {
                const dayPosts = postsData[selectedDay] ? [...postsData[selectedDay]] : [];
                while(dayPosts.length < daysInMonth) dayPosts.push({ text: "", status: "todo", type: "Static", date: "" });
                dayPosts[index] = specificDateStr ? { ...dayPosts[index], [field]: value, date: specificDateStr } : { ...dayPosts[index], [field]: value };
                const newPostsData = { ...postsData, [selectedDay]: dayPosts };
                setPostsData(newPostsData); syncToCloud({ postsData: newPostsData });
            };

            const addCompetitorRow = () => {
                const dayCompetitors = competitorsData[selectedDay] ? [...competitorsData[selectedDay]] : [];
                dayCompetitors.push({ id: Date.now(), name: "", url: "" });
                const newCompData = { ...competitorsData, [selectedDay]: dayCompetitors };
                setCompetitorsData(newCompData); syncToCloud({ competitorsData: newCompData });
            };

            const updateCompetitor = (index, field, value) => {
                const dayCompetitors = [...(competitorsData[selectedDay] || [])];
                dayCompetitors[index] = { ...dayCompetitors[index], [field]: value };
                const newCompData = { ...competitorsData, [selectedDay]: dayCompetitors };
                setCompetitorsData(newCompData); syncToCloud({ competitorsData: newCompData });
            };

            const removeCompetitor = (index) => {
                const dayCompetitors = [...(competitorsData[selectedDay] || [])];
                dayCompetitors.splice(index, 1);
                const newCompData = { ...competitorsData, [selectedDay]: dayCompetitors };
                setCompetitorsData(newCompData); syncToCloud({ competitorsData: newCompData });
            };

            useEffect(() => { const timer = setInterval(() => setCurrentDateObj(new Date()), 1000); return () => clearInterval(timer); }, []);

            const renderTextWithLinks = (text) => {
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                return text.split(urlRegex).map((part, i) => part.match(urlRegex) ? <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:text-blue-800 underline transition-colors break-all">{part}</a> : <span key={i} className="break-words">{part}</span>);
            };

            const calculateGlobalProgress = () => {
                let totalPublished = 0;
                ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"].forEach(day => {
                    (postsData[day] || []).forEach((p, i) => {
                        const expectedDate = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
                        if (p && p.status === 'published' && p.date === expectedDate) totalPublished++;
                    });
                });
                return totalPublished;
            };

            const renderSidebar = () => (
                <aside className="hidden md:flex flex-col w-72 bg-white border-r border-slate-200 h-screen fixed left-0 top-0 z-50">
                    <div className="p-6 border-b border-slate-100 flex items-center gap-3">
                        <div className="bg-blue-600 p-2 rounded-xl text-white shadow-md shadow-blue-200">
                            <Icon name="check-square" size={24} />
                        </div>
                        <div>
                            <h1 className="text-xl font-black text-slate-900 tracking-tight leading-none">RICKAAZ</h1>
                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Production Master</p>
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto py-6 px-4 space-y-8 custom-scrollbar">
                        <div>
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-3">Overview</p>
                            <nav className="space-y-1">
                                {['Master', 'Calendar'].map(d => (
                                    <button key={d} onClick={() => setSelectedDay(d)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-semibold text-sm ${selectedDay === d ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}>
                                        <Icon name={clientsData[d].icon} size={18} className={selectedDay === d ? 'text-white' : 'text-slate-400'} />
                                        {d}
                                    </button>
                                ))}
                            </nav>
                        </div>

                        <div>
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 px-3">Weekly Rotation</p>
                            <nav className="space-y-1">
                                {["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"].map(d => {
                                    const isSelected = selectedDay === d;
                                    return (
                                        <button key={d} onClick={() => setSelectedDay(d)} className={`w-full flex flex-col items-start px-4 py-3 rounded-xl transition-all ${isSelected ? 'bg-blue-50 border border-blue-100 shadow-sm' : 'border border-transparent hover:bg-slate-100'}`}>
                                            <div className="flex items-center gap-3 w-full">
                                                <Icon name={clientsData[d].icon} size={16} className={isSelected ? 'text-blue-600' : 'text-slate-400'} />
                                                <span className={`font-semibold text-sm ${isSelected ? 'text-blue-900' : 'text-slate-600'}`}>{d}</span>
                                            </div>
                                            <span className={`text-[10px] font-medium mt-1 truncate w-full text-left pl-7 ${isSelected ? 'text-blue-600' : 'text-slate-400'}`}>
                                                {clientsData[d].name.split(' (')[0]}
                                            </span>
                                        </button>
                                    );
                                })}
                            </nav>
                        </div>
                    </div>

                    <div className="p-4 border-t border-slate-100 bg-slate-50">
                        <div className="flex items-center gap-3 px-3 py-2 bg-white rounded-xl border border-slate-200 shadow-sm">
                            <div className={`w-2 h-2 rounded-full ${authStatus === 'connected' ? (isSyncing ? 'bg-yellow-400 animate-save' : 'bg-green-500') : 'bg-red-500'}`}></div>
                            <span className="text-[10px] font-bold text-slate-600 uppercase tracking-widest">
                                {authStatus === 'connected' ? (isSyncing ? 'Syncing...' : 'Synced') : 'Offline'}
                            </span>
                        </div>
                    </div>
                </aside>
            );

            const renderMobileNav = () => (
                <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-50 flex items-center justify-between px-2 pb-safe shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                    <div className="flex gap-1 overflow-x-auto no-scrollbar py-2 px-2 w-full">
                        {displayDays.map(d => {
                            const isSelected = selectedDay === d;
                            return (
                                <button key={d} onClick={() => { setSelectedDay(d); setIsMobileMenuOpen(false); }} className={`flex flex-col items-center justify-center min-w-[70px] py-2 rounded-xl transition-all ${isSelected ? 'bg-slate-900 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>
                                    <Icon name={clientsData[d].icon} size={18} className={isSelected ? 'text-white mb-1' : 'text-slate-400 mb-1'} />
                                    <span className={`text-[9px] font-bold uppercase tracking-wider`}>{d.substring(0,3)}</span>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );

            const renderHeader = () => (
                <header className="bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-40">
                    <div className="flex justify-between items-center px-6 py-4">
                        <div className="md:hidden flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg text-white"><Icon name="check-square" size={18} /></div>
                            <h1 className="text-lg font-black tracking-tight text-slate-900">RICKAAZ</h1>
                        </div>
                        
                        <div className="hidden md:block">
                            <h2 className="text-xl font-bold tracking-tight text-slate-800">{clientsData[selectedDay].name}</h2>
                            <p className="text-[11px] font-semibold text-slate-400 uppercase tracking-widest">{selectedDay} View</p>
                        </div>

                        <div className="flex items-center gap-4 bg-slate-50 border border-slate-200 px-4 py-2 rounded-2xl shadow-inner">
                            <Icon name="clock" size={16} className="text-slate-400" />
                            <div className="text-right">
                                <p className="text-xs font-bold text-slate-700 leading-none">
                                    {currentDateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}
                                </p>
                                <p className="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-0.5 leading-none">
                                    {currentDateObj.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}
                                </p>
                            </div>
                        </div>
                    </div>
                </header>
            );

            const renderDailyView = () => {
                const clientRes = resources[currentClient.name] || {};
                const safeColors = clientRes.colors || "";
                const safeLink = clientRes.link || "";

                return (
                    <div className="max-w-5xl mx-auto px-4 md:px-8 py-8 animate-fade-in pb-32 md:pb-8">
                        
                        {/* Client Banner */}
                        <div className="bg-slate-900 rounded-3xl p-6 md:p-8 text-white shadow-xl relative overflow-hidden mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6 border border-slate-800">
                            <div className="absolute -right-8 -top-8 opacity-10 pointer-events-none transform -rotate-12">
                                <Icon name={currentClient.icon} size={200} />
                            </div>
                            <div className="relative z-10">
                                <span className="inline-block bg-blue-500/20 text-blue-300 text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full mb-3 border border-blue-400/30">
                                    {selectedDay} Production
                                </span>
                                <h2 className="text-3xl md:text-4xl font-black tracking-tight mb-2">{currentClient.name}</h2>
                                <p className="text-sm md:text-base text-slate-400 font-medium max-w-lg">{currentClient.focus}</p>
                            </div>
                        </div>

                        {/* Inner Tabs Navigation */}
                        <div className="flex overflow-x-auto no-scrollbar gap-2 mb-8 bg-slate-200/50 p-1.5 rounded-2xl border border-slate-200">
                            {[
                                { id: 'pipeline', label: 'Post Pipeline', icon: 'layers' },
                                { id: 'vault', label: 'Idea Vault', icon: 'lightbulb' },
                                { id: 'resources', label: 'Resources', icon: 'paperclip' },
                                { id: 'competitors', label: 'Competitors', icon: 'target' }
                            ].map(tab => (
                                <button 
                                    key={tab.id} 
                                    onClick={() => setActiveInnerTab(tab.id)}
                                    className={`flex-1 min-w-[120px] flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-xs font-bold transition-all ${activeInnerTab === tab.id ? 'bg-white text-slate-900 shadow-sm border border-slate-200' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200'}`}
                                >
                                    <Icon name={tab.icon} size={16} className={activeInnerTab === tab.id ? 'text-blue-600' : 'text-slate-400'} />
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Tab Content: Pipeline */}
                        {activeInnerTab === 'pipeline' && (
                            <div className="space-y-6 fade-in">
                                {monthWeeks.map((week, wIdx) => (
                                    <div key={wIdx} className="bg-white rounded-3xl p-4 md:p-6 border border-slate-200 shadow-sm">
                                        <div className="flex items-center gap-3 mb-6 px-2">
                                            <div className="bg-blue-50 p-2 rounded-lg"><Icon name="calendar" size={16} className="text-blue-600" /></div>
                                            <h3 className="text-sm font-bold text-slate-800">{week.title}</h3>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Days {week.start + 1}-{week.start + week.count}</span>
                                        </div>
                                        
                                        <div className="space-y-3">
                                            {Array.from({length: week.count}, (_, idx) => week.start + idx).map(i => {
                                                const dayNum = i + 1;
                                                const isToday = dayNum === currentDayOfMonth;
                                                const expectedDateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
                                                const displayDateStr = `${String(dayNum).padStart(2, '0')}/${String(currentMonth + 1).padStart(2, '0')}/${currentYear}`;
                                                
                                                const rowDateObj = new Date(currentYear, currentMonth, dayNum);
                                                const dayOfWeekStr = rowDateObj.toLocaleDateString('en-GB', { weekday: 'short' });
                                                const isSunday = rowDateObj.getDay() === 0;

                                                const todaysEvents = getEventsForDay(dayNum);

                                                let post = (postsData[selectedDay] || [])[i] || { text: "", status: "todo", type: "Static", date: expectedDateStr };
                                                if (post.date && post.date !== expectedDateStr) post = { text: "", status: "todo", type: "Static", date: expectedDateStr };
                                                
                                                let statusStyles = "bg-slate-100 text-slate-500 hover:bg-slate-200 border-slate-200";
                                                let statusText = "TODO";
                                                if (post.status === 'in-progress') { statusStyles = "bg-yellow-50 text-yellow-700 hover:bg-yellow-100 border-yellow-200"; statusText = "IN PROGRESS"; } 
                                                else if (post.status === 'published') { statusStyles = "bg-green-500 text-white hover:bg-green-600 border-green-600 shadow-md"; statusText = "PUBLISHED"; }

                                                return (
                                                    <div key={i} id={`day-row-${dayNum}`} className={`flex flex-col xl:flex-row items-stretch xl:items-center gap-3 p-3 md:p-4 rounded-2xl border transition-all ${isToday ? 'bg-blue-50/50 border-blue-300 ring-2 ring-blue-100 shadow-sm' : 'bg-slate-50/50 border-slate-200 hover:border-blue-200'}`}>
                                                        
                                                        {/* Top Row on Mobile, Left block on Desktop */}
                                                        <div className="flex items-center gap-3 w-full xl:w-auto">
                                                            <div className={`w-10 h-10 md:w-12 md:h-12 rounded-xl flex flex-col items-center justify-center flex-shrink-0 border ${isToday ? 'bg-blue-600 text-white border-blue-700 shadow-md' : 'bg-white text-slate-400 border-slate-200 shadow-sm'}`}>
                                                                <span className="text-sm md:text-base font-black leading-none">{dayNum}</span>
                                                            </div>
                                                            
                                                            <div className="flex flex-col flex-1 xl:w-[150px]">
                                                                <div className={`flex items-center justify-between px-3 py-2.5 md:py-3 rounded-xl border bg-white shadow-sm text-xs font-bold ${isToday ? 'border-blue-200 text-blue-700' : 'border-slate-200 text-slate-600'}`}>
                                                                    <span>{displayDateStr} <span className={`ml-1 ${isSunday ? 'text-red-500' : 'text-slate-400'}`}>{dayOfWeekStr}</span></span>
                                                                    <Icon name="lock" size={12} className={isToday ? "text-blue-400" : "text-slate-300"} />
                                                                </div>
                                                            </div>
                                                        </div>

                                                        {/* Middle block */}
                                                        <div className="flex flex-col md:flex-row items-stretch gap-3 flex-1">
                                                            <PostTypeDropdown value={post.type || "Static"} onChange={(val) => updatePostDetails(i, 'type', val, expectedDateStr)} isLast={i >= (daysInMonth - 3)} />
                                                            <input 
                                                                type="text" 
                                                                placeholder="Post details..." 
                                                                className="flex-1 w-full bg-white border border-slate-200 outline-none text-sm font-semibold text-slate-700 placeholder-slate-400 focus:ring-2 focus:ring-blue-100 px-4 py-3 md:py-4 rounded-xl transition-all shadow-sm" 
                                                                value={post.text} 
                                                                onChange={e => updatePostDetails(i, 'text', e.target.value, expectedDateStr)} 
                                                            />
                                                        </div>

                                                        {/* Right block */}
                                                        <div className="flex items-center justify-between xl:justify-end gap-3 w-full xl:w-auto">
                                                            <div className="flex-1 xl:hidden">
                                                                {todaysEvents.map((ev, eIdx) => (
                                                                    <span key={eIdx} className="inline-block bg-purple-100 text-purple-700 text-[9px] px-2 py-1 rounded-md font-bold truncate">⭐ {ev.name}</span>
                                                                ))}
                                                            </div>
                                                            <button 
                                                                onClick={() => updatePostDetails(i, 'status', cyclePostStatus(post.status), expectedDateStr)} 
                                                                className={`px-4 md:px-6 py-3 md:py-4 rounded-xl text-[10px] font-black tracking-widest uppercase transition-all flex items-center justify-center gap-2 btn-interact flex-shrink-0 w-auto xl:w-[150px] border ${statusStyles}`}
                                                            >
                                                                {statusText}
                                                            </button>
                                                        </div>
                                                        
                                                        {/* Desktop Events positioned absolutely or inline cleanly */}
                                                        {todaysEvents.length > 0 && (
                                                            <div className="hidden xl:flex absolute -top-2.5 right-6 gap-1">
                                                                {todaysEvents.map((ev, eIdx) => (
                                                                    <span key={eIdx} className="bg-purple-100 border border-purple-200 text-purple-700 text-[9px] px-2 py-0.5 rounded-md font-bold shadow-sm">⭐ {ev.name}</span>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Tab Content: Vault */}
                        {activeInnerTab === 'vault' && (
                            <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden fade-in">
                                <div className="p-6 md:p-8 border-b border-slate-100 bg-slate-50/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                    <div>
                                        <h2 className="font-black text-slate-900 text-xl flex items-center gap-2"><Icon name="lightbulb" className="text-yellow-500"/> Idea Vault</h2>
                                        <p className="text-xs text-slate-500 font-medium mt-1">Cross-client brainstorming & reference links.</p>
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto w-full md:w-auto pb-2 md:pb-0 no-scrollbar">
                                        {vaultTabs.map(tab => (
                                            <button key={tab.id} onClick={() => setSelectedIdeaClient(tab.id)} className={`whitespace-nowrap px-4 py-2 rounded-lg text-[10px] font-bold uppercase transition-all ${selectedIdeaClient === tab.id ? 'bg-slate-800 text-white' : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                                                {tab.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-6 md:p-8">
                                    <form onSubmit={addIdea} className="flex flex-col sm:flex-row gap-3 mb-8">
                                        <input type="text" value={newIdea} onChange={(e) => setNewIdea(e.target.value)} placeholder={`Add an idea for ${selectedIdeaClient.split(' ')[0]}...`} className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-100 font-semibold" />
                                        <button type="submit" className="bg-slate-900 text-white font-bold px-6 py-3 rounded-xl text-xs hover:bg-slate-800 transition-colors">Save Idea</button>
                                    </form>
                                    
                                    <div className="space-y-3">
                                        {(ideas[selectedIdeaClient] || []).length > 0 ? (
                                            (ideas[selectedIdeaClient] || []).map(idea => {
                                                const urlMatch = idea.text.match(/(https?:\/\/[^\s]+)/);
                                                const firstUrl = urlMatch ? urlMatch[0] : null;
                                                let domain = "";
                                                if (firstUrl) { try { domain = new URL(firstUrl).hostname; } catch(e) {} }

                                                return (
                                                    <div key={idea.id} className="group flex justify-between items-center gap-4 p-4 bg-white rounded-xl border border-slate-200 hover:border-blue-300 transition-all shadow-sm">
                                                        <p className="text-sm text-slate-700 font-medium flex-1 break-words">{renderTextWithLinks(idea.text)}</p>
                                                        <div className="flex items-center gap-3">
                                                            {firstUrl && domain && <IdeaLinkPreview url={firstUrl} domain={domain} />}
                                                            <button onClick={() => removeIdea(selectedIdeaClient, idea.id)} className="text-slate-300 hover:text-red-500 transition-colors p-2 bg-slate-50 rounded-lg hover:bg-red-50"><Icon name="trash-2" size={16} /></button>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        ) : (
                                            <div className="py-12 text-center border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50">
                                                <Icon name="inbox" className="mx-auto text-slate-300 mb-3" size={32} />
                                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Vault is empty</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab Content: Competitors */}
                        {activeInnerTab === 'competitors' && (
                            <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden fade-in">
                                <div className="p-6 md:p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <div>
                                        <h2 className="font-black text-slate-900 text-xl flex items-center gap-2"><Icon name="target" className="text-red-500"/> Competitors</h2>
                                        <p className="text-xs text-slate-500 font-medium mt-1">Track rivals for {currentClient.name}</p>
                                    </div>
                                    <button onClick={addCompetitorRow} className="bg-white border border-slate-200 text-slate-700 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-slate-50 transition-all shadow-sm flex items-center gap-2">
                                        <Icon name="plus" size={14} /> Add
                                    </button>
                                </div>
                                <div className="p-6 md:p-8 space-y-4">
                                    {(competitorsData[selectedDay] || []).length > 0 ? (
                                        (competitorsData[selectedDay] || []).map((comp, i) => (
                                            <div key={comp.id} className="flex flex-col md:flex-row items-center gap-3 bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
                                                <div className="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 font-bold flex items-center justify-center text-xs flex-shrink-0">{i + 1}</div>
                                                <input type="text" placeholder="Competitor Name..." className="w-full md:w-1/3 bg-slate-50 outline-none text-sm font-semibold text-slate-700 p-3 rounded-lg border border-transparent focus:border-blue-200 focus:bg-white transition-colors" value={comp.name} onChange={(e) => updateCompetitor(i, 'name', e.target.value)} />
                                                <input type="text" placeholder="URL..." className="flex-1 w-full bg-slate-50 outline-none text-sm font-semibold text-slate-700 p-3 rounded-lg border border-transparent focus:border-blue-200 focus:bg-white transition-colors" value={comp.url} onChange={(e) => updateCompetitor(i, 'url', e.target.value)} />
                                                <div className="flex w-full md:w-auto gap-2">
                                                    {comp.url && <a href={comp.url} target="_blank" className="flex-1 md:flex-none flex items-center justify-center p-3 text-slate-400 hover:text-blue-600 bg-slate-50 hover:bg-blue-50 rounded-lg transition-colors"><Icon name="external-link" size={16} /></a>}
                                                    <button onClick={() => removeCompetitor(i)} className="flex-1 md:flex-none flex items-center justify-center p-3 text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 rounded-lg transition-colors"><Icon name="trash-2" size={16} /></button>
                                                </div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="py-12 text-center border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50">
                                            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">No competitors added</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Tab Content: Resources */}
                        {activeInnerTab === 'resources' && (
                            <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 md:p-8 fade-in">
                                <h2 className="font-black text-slate-900 text-xl flex items-center gap-2 mb-6"><Icon name="paperclip" className="text-emerald-500"/> Brand Resources</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4">Color Palette (Hex Codes)</label>
                                        <div className="flex gap-2 flex-wrap mb-4">
                                            {safeColors.split(',').filter(c=>c.trim().startsWith('#')).length > 0 ? 
                                                safeColors.split(',').map((c, i) => c.trim().startsWith('#') && <div key={i} className="w-8 h-8 rounded-full shadow-sm border border-slate-200" style={{ backgroundColor: c.trim() }} />)
                                                : <div className="w-8 h-8 rounded-full border-2 border-dashed border-slate-300"></div>
                                            }
                                        </div>
                                        <input type="text" placeholder="#HEX, #HEX" className="w-full text-xs bg-white border border-slate-200 rounded-lg px-4 py-3 outline-none focus:border-blue-300 font-mono" value={safeColors} onChange={(e) => updateResource(currentClient.name, 'colors', e.target.value)} />
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4">Asset Folder (Google Drive)</label>
                                        <div className="flex gap-2">
                                            <input type="text" placeholder="Paste URL here..." className="flex-1 text-xs bg-white border border-slate-200 rounded-lg px-4 py-3 outline-none focus:border-blue-300" value={safeLink} onChange={(e) => updateResource(currentClient.name, 'link', e.target.value)} />
                                            {safeLink && <a href={safeLink} target="_blank" className="px-4 bg-slate-800 text-white rounded-lg flex items-center shadow-sm hover:bg-slate-700 transition-colors"><Icon name="external-link" size={16} /></a>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                );
            };

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden font-sans text-slate-800">
                    {errorMessage && (
                        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] bg-red-600 text-white text-xs font-bold px-6 py-3 rounded-full shadow-xl animate-fade-in flex items-center gap-2">
                            <Icon name="alert-triangle" size={14} /> {errorMessage}
                        </div>
                    )}

                    {renderSidebar()}
                    
                    <div className="flex-1 flex flex-col h-screen md:ml-72 relative">
                        {renderHeader()}
                        
                        <div className="flex-1 overflow-y-auto custom-scrollbar relative">
                            {selectedDay === 'Master' ? (
                                <main className="max-w-7xl mx-auto px-4 md:px-8 py-8 animate-fade-in pb-32 md:pb-8">
                                    <div className="bg-slate-900 text-white rounded-3xl px-8 py-8 shadow-xl relative overflow-hidden border border-slate-800 mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
                                        <div className="absolute -right-12 -top-12 opacity-10 pointer-events-none transform rotate-12">
                                            <Icon name="layout-dashboard" size={200} />
                                        </div>
                                        <div className="relative z-10">
                                            <h2 className="text-[10px] font-black text-blue-400 uppercase mb-2 tracking-[0.4em]">Monthly Overview • {monthName} {currentYear}</h2>
                                            <h3 className="text-3xl md:text-4xl font-black tracking-tight leading-none">Production Master</h3>
                                        </div>
                                        <div className="bg-white/10 border border-white/10 p-5 rounded-2xl backdrop-blur-md text-center min-w-[180px] relative z-10">
                                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Global Progress</p>
                                            <div className="flex items-baseline justify-center gap-1">
                                                <span className="text-4xl font-black text-emerald-400">{calculateGlobalProgress()}</span>
                                                <span className="text-sm font-bold text-slate-400">/ {6 * daysInMonth}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                        {["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"].map(day => {
                                            const dayPosts = postsData[day] || [];
                                            let publishedCount = 0;
                                            const slots = Array.from({length: daysInMonth}, (_, i) => {
                                                const expectedDate = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
                                                let p = dayPosts[i] || { status: 'todo', text: '', type: 'Static', date: expectedDate };
                                                if (p.date && p.date !== expectedDate) p = { status: 'todo', text: '', type: 'Static', date: expectedDate };
                                                if (p.status === 'published') publishedCount++;
                                                return p;
                                            });

                                            return (
                                                <div key={day} className="bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col hover:shadow-md transition-all">
                                                    <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-3xl">
                                                        <div>
                                                            <h4 className="font-black text-slate-800 text-lg flex items-center gap-2"><Icon name={clientsData[day].icon} size={16} className="text-slate-400"/> {day}</h4>
                                                            <p className="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-0.5 truncate max-w-[150px]">{clientsData[day].name.split(' (')[0]}</p>
                                                        </div>
                                                        <div className={`px-3 py-1.5 rounded-lg text-xs font-bold ${publishedCount === daysInMonth ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}`}>
                                                            {publishedCount}/{daysInMonth}
                                                        </div>
                                                    </div>
                                                    <div className="p-4 flex flex-col gap-2 flex-1 max-h-[350px] overflow-y-auto custom-scrollbar">
                                                        {slots.map((post, i) => {
                                                            const isPub = post.status === 'published';
                                                            const dateStr = `${String(i + 1).padStart(2, '0')}/${String(currentMonth + 1).padStart(2, '0')}`;
                                                            return (
                                                                <div key={i} className={`flex items-center gap-3 p-3 rounded-xl border ${isPub ? 'bg-emerald-50/50 border-emerald-100' : 'bg-slate-50/50 border-slate-100'}`}>
                                                                    <Icon name={isPub ? "check-circle" : "circle"} className={isPub ? "text-emerald-500" : "text-slate-300"} size={16} />
                                                                    <div className="flex-1 min-w-0">
                                                                        <p className={`text-xs font-semibold truncate ${isPub ? 'text-emerald-900' : 'text-slate-500'}`}>{post.text || "—"}</p>
                                                                        <p className={`text-[9px] font-bold uppercase tracking-widest mt-0.5 ${isPub ? 'text-emerald-600' : 'text-slate-400'}`}>
                                                                            {dateStr} • {post.type.substring(0,3)}
                                                                        </p>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                    <button onClick={() => setSelectedDay(day)} className="m-4 mt-0 bg-slate-900 text-white text-[10px] font-bold uppercase tracking-widest p-3 rounded-xl hover:bg-blue-600 transition-colors">
                                                        Open {day}
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </main>
                            ) : selectedDay === 'Calendar' ? (
                                <main className="max-w-7xl mx-auto px-4 md:px-8 py-8 animate-fade-in pb-32 md:pb-8">
                                    <section className="bg-slate-900 text-white rounded-3xl px-8 py-8 shadow-xl relative overflow-hidden border border-slate-800 mb-8">
                                        <div className="absolute -right-8 -top-8 opacity-10 pointer-events-none transform rotate-12">
                                            <Icon name="calendar-heart" size={200} />
                                        </div>
                                        <div className="relative z-10">
                                            <h2 className="text-[10px] font-black text-blue-400 uppercase mb-2 tracking-[0.4em]">Content Calendar</h2>
                                            <h3 className="text-3xl md:text-4xl font-black tracking-tight leading-none mb-3">Events & Holidays</h3>
                                            <p className="text-sm text-slate-400 max-w-xl font-medium">Annual events and holidays for the UK, Canada, and International audiences.</p>
                                        </div>
                                    </section>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                        {calendarEvents.map((monthData, idx) => (
                                            <div key={idx} className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                                <div className="bg-slate-50/80 border-b border-slate-100 px-5 py-4 flex items-center gap-2">
                                                    <Icon name="calendar-days" size={16} className="text-slate-400" />
                                                    <h4 className="font-bold text-slate-800 uppercase text-sm tracking-wide">{monthData.month}</h4>
                                                </div>
                                                <div className="p-5 space-y-4">
                                                    {monthData.events.map((event, eIdx) => (
                                                        <div key={eIdx} className="flex gap-3">
                                                            <span className="text-[10px] font-black text-blue-600 uppercase tracking-widest w-12 pt-0.5">{event.date}</span>
                                                            <div className="flex-1">
                                                                <p className="text-xs font-bold text-slate-700 leading-tight">{event.name}</p>
                                                                <p className="text-[8px] font-bold text-slate-400 uppercase mt-0.5">{event.type}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </main>
                            ) : (
                                renderDailyView()
                            )}
                        </div>
                    </div>
                    {renderMobileNav()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
