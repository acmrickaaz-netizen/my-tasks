<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICKAAZ | Production Master</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running the app in the browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .btn-interact { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-interact:active { transform: scale(0.95); }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        @keyframes savePulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .animate-save {
            animation: savePulse 1.5s infinite;
        }

        /* Customizing the date input to ensure it is fully clickable even when invisible */
        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- Firebase Configuration Logic ---
        const getFirebaseConfig = () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try {
                    return JSON.parse(__firebase_config);
                } catch (e) {
                    console.error("Failed to parse environment config:", e);
                }
            }
            return {
                apiKey: "AIzaSyAfAKZ-WDJo2qb9FOu0u0NyaNig5V04ofg",
                authDomain: "production-master-dashboard.firebaseapp.com",
                projectId: "production-master-dashboard",
                storageBucket: "production-master-dashboard.firebasestorage.app",
                messagingSenderId: "444022330801",
                appId: "1:444022330801:web:bda76dc5ed3b8cab511990"
            };
        };

        const config = getFirebaseConfig();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'production-master-custom';

        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // Helper to parse dynamic dates (like "1st Mon", "Jan 14") to actual integer days of the month
        const parseEventDay = (dateStr, year, monthIndex) => {
            const exactMatch = dateStr.match(/^[A-Za-z]{3}\s(\d+)/);
            if (exactMatch) return parseInt(exactMatch[1], 10);
            
            const nthMatch = dateStr.match(/^(1st|2nd|3rd|4th)\s(Mon|Tue|Wed|Thu|Fri|Sat|Sun)/);
            if (nthMatch) {
                const nthMap = { "1st": 1, "2nd": 2, "3rd": 3, "4th": 4 };
                const dayMap = { "Sun": 0, "Mon": 1, "Tue": 2, "Wed": 3, "Thu": 4, "Fri": 5, "Sat": 6 };
                const targetN = nthMap[nthMatch[1]];
                const targetD = dayMap[nthMatch[2]];
                let count = 0;
                for (let i = 1; i <= 31; i++) {
                    const d = new Date(year, monthIndex, i);
                    if (d.getMonth() !== monthIndex) break;
                    if (d.getDay() === targetD) {
                        count++;
                        if (count === targetN) return i;
                    }
                }
            }
            return null; // For specific holidays labeled "Varies"
        };

        // --- Smart Link Preview Component ---
        const IdeaLinkPreview = ({ url, domain }) => {
            const [imageUrl, setImageUrl] = useState(null);

            useEffect(() => {
                const fetchPreview = async () => {
                    try {
                        const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                        const data = await res.json();
                        if (data.status === 'success' && data.data?.image?.url) {
                            setImageUrl(data.data.image.url);
                        }
                    } catch (e) {
                        console.error("Failed to fetch link preview", e);
                    }
                };
                if (url) fetchPreview();
            }, [url]);

            if (imageUrl) {
                return (
                    <a href={url} target="_blank" rel="noopener noreferrer" className="relative block w-20 h-20 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all hover:border-blue-400 hover:scale-105 border border-slate-200 flex-shrink-0 bg-slate-100 group/preview" title="Open Link">
                        <img src={imageUrl} alt="Link Preview" className="w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-black/0 group-hover/preview:bg-black/20 transition-all flex items-center justify-center">
                            <Icon name="external-link" size={20} className="text-white opacity-0 group-hover/preview:opacity-100 drop-shadow-md" />
                        </div>
                    </a>
                );
            }

            return (
                <a href={url} target="_blank" rel="noopener noreferrer" className="hidden sm:flex flex-col items-center justify-center w-20 h-20 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-400 hover:shadow-md transition-all flex-shrink-0 hover:scale-105" title="Open Link">
                    <img src={`https://www.google.com/s2/favicons?domain=${domain}&sz=128`} alt={domain} className="w-8 h-8 mb-1.5 object-contain opacity-80" />
                    <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest truncate w-16 text-center">{domain.replace('www.', '')}</span>
                </a>
            );
        };

        // --- Custom Dropdown Component for Post Types ---
        const PostTypeDropdown = ({ value, onChange, isLast }) => {
            const [isOpen, setIsOpen] = useState(false);
            const options = [
                { id: 'Static', icon: 'image', label: 'Static' },
                { id: 'Video', icon: 'video', label: 'Video' },
                { id: 'Carousel', icon: 'layers', label: 'Carousel' }
            ];

            const currentOption = options.find(o => o.id === value) || options[0];

            return (
                <div className="relative w-full md:w-[140px] flex-shrink-0">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full bg-slate-50 border border-slate-100 outline-none text-xs font-bold text-slate-700 px-4 py-3.5 rounded-xl transition-all cursor-pointer shadow-sm flex items-center justify-between gap-2 hover:bg-white focus:ring-2 focus:ring-blue-100"
                    >
                        <div className="flex items-center gap-2.5">
                            <Icon name={currentOption.icon} size={14} className="text-blue-500" />
                            {currentOption.label}
                        </div>
                        <Icon name="chevron-down" size={14} className="text-slate-400" />
                    </button>
                    
                    {isOpen && (
                        <>
                            <div className="fixed inset-0 z-[50]" onClick={() => setIsOpen(false)}></div>
                            <div className={`absolute left-0 w-full bg-white border border-slate-100 rounded-xl shadow-2xl z-[60] overflow-hidden flex flex-col py-1 ${isLast ? 'bottom-full mb-2' : 'top-full mt-2'}`}>
                                {options.map(opt => (
                                    <button
                                        key={opt.id}
                                        onClick={() => { onChange(opt.id); setIsOpen(false); }}
                                        className="w-full text-left px-4 py-3 text-xs font-bold text-slate-600 hover:bg-slate-50 flex items-center gap-2.5 transition-all"
                                    >
                                        <Icon name={opt.icon} size={14} className={value === opt.id ? "text-blue-600" : "text-slate-400"} />
                                        <span className={value === opt.id ? "text-slate-900" : ""}>{opt.label}</span>
                                    </button>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [authStatus, setAuthStatus] = useState('connecting');
            const [errorMessage, setErrorMessage] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            
            // Current Date/Month Setup for Auto-Refreshing Logic
            const [currentDateObj, setCurrentDateObj] = useState(new Date());
            const currentYear = currentDateObj.getFullYear();
            const currentMonth = currentDateObj.getMonth();
            const currentDayOfMonth = currentDateObj.getDate();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const monthName = currentDateObj.toLocaleString('default', { month: 'long' });
            
            // Build Week Groupings dynamically based on days in the month
            const monthWeeks = useMemo(() => {
                const weeks = [];
                for (let i = 0; i < daysInMonth; i += 7) {
                    const count = Math.min(7, daysInMonth - i);
                    weeks.push({
                        title: `Week ${weeks.length + 1}`,
                        start: i,
                        count: count
                    });
                }
                return weeks;
            }, [daysInMonth]);

            // Calendar Special Days Data
            const calendarEvents = useMemo(() => [
                { month: "January", events: [{ date: "Jan 1", name: "New Year's Day", type: "Global" }, { date: "Jan 25", name: "Burns Night", type: "UK" }, { date: "Jan 27", name: "Int. Holocaust Remembrance Day", type: "Global" }] },
                { month: "February", events: [{ date: "Feb 14", name: "Valentine’s Day", type: "Global" }, { date: "3rd Mon", name: "Family Day", type: "Canada" }] },
                { month: "March", events: [{ date: "Mar 1", name: "St. David's Day (Wales)", type: "UK" }, { date: "Mar 8", name: "Int. Women's Day", type: "Global" }, { date: "Mar 9", name: "Commonwealth Day", type: "UK" }, { date: "Mar 15", name: "Mothering Sunday", type: "UK" }, { date: "Mar 17", name: "St. Patrick's Day", type: "UK/Int" }, { date: "Mar 22", name: "World Water Day", type: "Global" }] },
                { month: "April", events: [{ date: "Apr 1", name: "April Fools' Day", type: "Global" }, { date: "Apr 3", name: "Good Friday", type: "UK/Can" }, { date: "Apr 6", name: "Easter Monday", type: "UK/Can" }, { date: "Apr 22", name: "Earth Day", type: "Global" }, { date: "Apr 23", name: "St. George's Day (England)", type: "UK" }] },
                { month: "May", events: [{ date: "May 1", name: "May Day / Labour Day", type: "UK/Int" }, { date: "May 4", name: "Early May Bank Holiday", type: "UK" }, { date: "May 25", name: "Spring Bank Holiday", type: "UK" }, { date: "Varies", name: "Victoria Day", type: "Canada" }] },
                { month: "June", events: [{ date: "Jun 5", name: "World Environment Day", type: "Global" }, { date: "Jun 13", name: "King's Official Birthday", type: "UK" }, { date: "Jun 21", name: "Father's Day", type: "Global" }, { date: "Jun 21", name: "Nat. Indigenous Peoples Day", type: "Canada" }] },
                { month: "July", events: [{ date: "Jul 1", name: "Canada Day", type: "Canada" }, { date: "Jul 13", name: "Orangemen's Day (NI)", type: "UK" }] },
                { month: "August", events: [{ date: "1st Mon", name: "Civic Holiday", type: "Canada" }, { date: "Aug 3", name: "Summer Bank Holiday (Scotland)", type: "UK" }, { date: "Aug 31", name: "August Bank Holiday", type: "UK" }] },
                { month: "September", events: [{ date: "1st Mon", name: "Labour Day", type: "Canada" }, { date: "Sep 30", name: "Truth & Reconciliation Day", type: "Canada" }] },
                { month: "October", events: [{ date: "2nd Mon", name: "Thanksgiving", type: "Canada" }, { date: "Oct 31", name: "Halloween", type: "Global" }] },
                { month: "November", events: [{ date: "Nov 5", name: "Bonfire Night (Guy Fawkes)", type: "UK" }, { date: "Nov 11", name: "Remembrance Day", type: "UK/Can" }, { date: "Nov 30", name: "St. Andrew's Day (Scotland)", type: "UK" }] },
                { month: "December", events: [{ date: "Dec 25", name: "Christmas Day", type: "Global" }, { date: "Dec 26", name: "Boxing Day", type: "UK/Can" }, { date: "Dec 31", name: "New Year's Eve", type: "Global" }] }
            ], []);

            const getEventsForDay = useCallback((dayNum) => {
                const monthData = calendarEvents.find(m => m.month === monthName);
                if (!monthData) return [];
                return monthData.events.filter(ev => {
                    const evDay = parseEventDay(ev.date, currentYear, currentMonth);
                    return evDay === dayNum;
                });
            }, [monthName, currentYear, currentMonth, calendarEvents]);

            // Content State
            const [ideas, setIdeas] = useState({});
            const [resources, setResources] = useState({});
            const [postsData, setPostsData] = useState({}); // State for the daily posts
            const [competitorsData, setCompetitorsData] = useState({}); // State for Competitors

            const clientsData = useMemo(() => ({
                Master: { name: "Monthly Overview", focus: "Global production status." },
                Calendar: { name: "Events & Holidays", focus: "UK, Canada & Int. Key Dates." },
                Monday: { name: "Universal Holidays (UK)", focus: "High-end travel flyers & holiday package graphics." },
                Tuesday: { name: "Fly Universal (UK)", focus: "Last Minute deal templates & flight route maps." },
                Wednesday: { name: "Airfleet Limo (Canada)", focus: "Professional fleet showcases & service area highlights." },
                Thursday: { name: "Tours Coach (Canada)", focus: "Group travel imagery & event-based transport ads." },
                Friday: { name: "Ideal Hajj & Umrah (UK)", focus: "Spiritual guides, package details, & religious iconography." },
                Saturday: { name: "Maintenance", focus: "Weekly review and planning." }
            }), []);

            const vaultTabs = [
                { id: "Universal Holidays (UK)", label: "Univ Hol" },
                { id: "Fly Universal (UK)", label: "Fly Univ" },
                { id: "Airfleet Limo (Canada)", label: "Airfleet" },
                { id: "Tours Coach (Canada)", label: "Tours" },
                { id: "Ideal Hajj & Umrah (UK)", label: "Ideal Hajj" },
                { id: "Global Strategy", label: "Global" }
            ];

            const fullWeekDays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const todayStr = fullWeekDays[new Date().getDay()];
            const actualToday = todayStr === "Sunday" ? "Monday" : todayStr;
            
            const displayDays = ["Master", "Calendar", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            
            const [selectedDay, setSelectedDay] = useState(actualToday);
            const currentClient = clientsData[selectedDay];
            const [selectedIdeaClient, setSelectedIdeaClient] = useState("Global Strategy");
            const [newIdea, setNewIdea] = useState("");

            // Auto-sync Idea Vault tab to the currently selected Day (except on Master/Calendar view)
            useEffect(() => {
                if (selectedDay === "Master" || selectedDay === "Calendar") return; 
                const clientName = clientsData[selectedDay].name;
                if (clientName === "Maintenance" || clientName === "Rest") {
                    setSelectedIdeaClient("Global Strategy");
                } else {
                    setSelectedIdeaClient(clientName);
                }
            }, [selectedDay, clientsData]);

            useEffect(() => {
                const initAuth = async () => { 
                    try { 
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { 
                        console.error("Auth Error:", e);
                        setAuthStatus('error');
                        setErrorMessage("Auth failed: " + e.message);
                    } 
                };
                initAuth();
                return auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) {
                        setAuthStatus('connected');
                        setErrorMessage(null);
                    }
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // --- PERMANENT GLOBAL CLOUD PATH ---
                const path = `/artifacts/${appId}/public/data/dashboard/current`;
                const docRef = db.doc(path);
                
                const unsubscribe = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        if (data.ideas) setIdeas(data.ideas);
                        if (data.resources) setResources(data.resources);
                        if (data.postsData) setPostsData(data.postsData);
                        if (data.competitorsData) setCompetitorsData(data.competitorsData);
                    }
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setErrorMessage("Database access denied. Check Firebase Rules.");
                });

                return () => unsubscribe();
            }, [user, actualToday]);

            // Auto-Scroll to the current day when a client tab is opened
            useEffect(() => {
                if (selectedDay !== 'Master' && selectedDay !== 'Calendar') {
                    // Small timeout to ensure the DOM is fully rendered before scrolling
                    setTimeout(() => {
                        const todayRow = document.getElementById(`day-row-${currentDayOfMonth}`);
                        if (todayRow) {
                            todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 150);
                }
            }, [selectedDay, currentDayOfMonth]);

            const syncToCloud = useCallback(async (updates) => {
                if (!user) {
                    setErrorMessage("Error: Disconnected. Sign-in required.");
                    return;
                }
                setIsSyncing(true);
                
                const path = `/artifacts/${appId}/public/data/dashboard/current`;
                const docRef = db.doc(path);
                try { 
                    await docRef.set(updates, { merge: true }); 
                    setErrorMessage(null);
                } catch (e) {
                    console.error("Save Error:", e);
                    setErrorMessage("Save failed: " + e.message);
                } finally { 
                    setIsSyncing(false); 
                }
            }, [user]);

            const updateResource = (clientName, field, value) => {
                const updatedResources = { ...resources, [clientName]: { ...(resources[clientName] || {}), [field]: value } };
                setResources(updatedResources);
                syncToCloud({ resources: updatedResources });
            };

            const addIdea = (e) => {
                e.preventDefault();
                if (!newIdea.trim()) return;
                const updatedIdeas = { 
                    ...ideas, 
                    [selectedIdeaClient]: [...(ideas[selectedIdeaClient] || []), { id: Date.now(), text: newIdea }] 
                };
                setIdeas(updatedIdeas);
                syncToCloud({ ideas: updatedIdeas });
                setNewIdea("");
            };

            const removeIdea = (clientKey, id) => {
                const updated = { ...ideas, [clientKey] : (ideas[clientKey] || []).filter(i => i.id !== id) };
                setIdeas(updated);
                syncToCloud({ ideas: updated });
            };

            // Post Pipeline Functions
            const cyclePostStatus = (status) => {
                if (status === 'todo') return 'in-progress';
                if (status === 'in-progress') return 'published';
                return 'todo';
            };

            // Enhanced update function that stamps the explicit date string
            const updatePostDetails = (index, field, value, specificDateStr) => {
                const dayPosts = postsData[selectedDay] ? [...postsData[selectedDay]] : [];
                
                // Ensure array size matches the month length
                while(dayPosts.length < daysInMonth) dayPosts.push({ text: "", status: "todo", type: "Static", date: "" });

                // If specificDateStr is provided, it means we are locking the record to that exact date
                if (specificDateStr) {
                    dayPosts[index] = { ...dayPosts[index], [field]: value, date: specificDateStr };
                } else {
                    dayPosts[index] = { ...dayPosts[index], [field]: value };
                }
                
                const newPostsData = { ...postsData, [selectedDay]: dayPosts };
                
                setPostsData(newPostsData);
                syncToCloud({ postsData: newPostsData });
            };

            // Competitor Functions
            const addCompetitorRow = () => {
                const dayCompetitors = competitorsData[selectedDay] ? [...competitorsData[selectedDay]] : [];
                dayCompetitors.push({ id: Date.now(), name: "", url: "" });
                const newCompData = { ...competitorsData, [selectedDay]: dayCompetitors };
                setCompetitorsData(newCompData);
                syncToCloud({ competitorsData: newCompData });
            };

            const updateCompetitor = (index, field, value) => {
                const dayCompetitors = [...(competitorsData[selectedDay] || [])];
                dayCompetitors[index] = { ...dayCompetitors[index], [field]: value };
                const newCompData = { ...competitorsData, [selectedDay]: dayCompetitors };
                setCompetitorsData(newCompData);
                syncToCloud({ competitorsData: newCompData });
            };

            const removeCompetitor = (index) => {
                const dayCompetitors = [...(competitorsData[selectedDay] || [])];
                dayCompetitors.splice(index, 1);
                const newCompData = { ...competitorsData, [selectedDay]: dayCompetitors };
                setCompetitorsData(newCompData);
                syncToCloud({ competitorsData: newCompData });
            };

            useEffect(() => {
                const timer = setInterval(() => setCurrentDateObj(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Safe fallback logic for resources to prevent crashes if partially saved
            const clientRes = resources[currentClient.name] || {};
            const safeColors = clientRes.colors || "";
            const safeLink = clientRes.link || "";

            const renderTextWithLinks = (text) => {
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const parts = text.split(urlRegex);
                return parts.map((part, i) => {
                    if (part.match(urlRegex)) {
                        return (
                            <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:text-blue-800 underline transition-colors break-all">
                                {part}
                            </a>
                        );
                    }
                    return <span key={i} className="break-words">{part}</span>;
                });
            };

            // Calculates the global progress for the Master view strictly based on current month's dates
            const calculateGlobalProgress = () => {
                let totalPublished = 0;
                const workDays = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                workDays.forEach(day => {
                    const dayPosts = postsData[day] || [];
                    for (let i=0; i<daysInMonth; i++) {
                        const expectedDate = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
                        const p = dayPosts[i];
                        // Only count it if it's explicitly tied to THIS month's date
                        if (p && p.status === 'published' && p.date === expectedDate) {
                            totalPublished++;
                        }
                    }
                });
                return totalPublished;
            };

            const globalMaxProgress = 6 * daysInMonth;

            return (
                <div className="min-h-screen pb-28 bg-slate-50">
                    {errorMessage && (
                        <div className="bg-red-600 text-white text-[10px] font-black text-center py-3 uppercase tracking-[0.2em] sticky top-0 z-[60] shadow-lg animate-pulse flex items-center justify-center gap-2">
                            <Icon name="alert-triangle" size={14} /> {errorMessage}
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex flex-col items-center md:items-start">
                                <div className="flex items-center gap-3">
                                    <div className="bg-blue-600 p-2 rounded-xl text-white shadow-md">
                                        <Icon name="check-square" size={20} />
                                    </div>
                                    <h1 className="text-3xl font-[900] text-slate-900 tracking-tighter leading-none">DAILY TASKS</h1>
                                </div>
                                <div className="flex items-center gap-2 mt-2 ml-1">
                                    <span className="h-0.5 w-8 bg-blue-600 rounded-full"></span>
                                    <p className="text-[10px] font-extrabold text-slate-400 uppercase tracking-[0.3em]">Production Master</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-6">
                                <div className="hidden md:flex flex-col items-end">

                                                </div>

                                    </div>

                    /* ====================================================================== */
                    /* MASTER VIEW RENDERING                                                  */
                    /* ====================================================================== */
                    selectedDay === 'Master' ? (

                                <div className="absolute -top-16 -right-6 opacity-10 pointer-events-none transition-transform duration-1000 rotate-12">
                                    <Icon name="globe" size={250} />
                                </div>
                                <div className="relative z-10 flex flex-col md:flex-row justify-between items-center gap-8">
                                    <div>
                                        <h2 className="text-[10px] font-black text-blue-400 uppercase mb-2 tracking-[0.4em]">Monthly Overview - {monthName} {currentYear}</h2>
                                        <h3 className="text-4xl font-[900] tracking-tight leading-none">Master Production Board</h3>
                                        <p className="text-sm font-medium text-slate-400 mt-4 max-w-xl">A complete bird's-eye view of all client posts for the month. Track global publishing progress perfectly synced to {monthName}.</p>

                                    const dayPosts = postsData[day] || [];
                                    let publishedCount = 0;
                                    
                                    // Process exactly `daysInMonth` slots for accurate calendar mapping
                                    const slots = Array.from({length: daysInMonth}, (_, i) => {
                                        const expectedDate = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
                                        let p = dayPosts[i] || { status: 'todo', text: '', type: 'Static', date: expectedDate };
                                        
                                        // Auto-refresh: If the saved date is not from this month, present an empty slate
                                        if (p.date && p.date !== expectedDate) {
                                            p = { status: 'todo', text: '', type: 'Static', date: expectedDate };
                                        }
                                        
                                        if (p.status === 'published') publishedCount++;
                                        return p;
                                    });

                                        <div key={day} className="bg-white rounded-[2rem] border border-slate-200 shadow-xl overflow-hidden flex flex-col hover:border-blue-400 transition-all hover:-translate-y-1">

                                                </div>

                                                    const isToday = dayNum === currentDayOfMonth;
                                                    const isPublished = post.status === 'published';
                                                    const displayDateStr = `${String(dayNum).padStart(2, '0')}/${String(currentMonth + 1).padStart(2, '0')}/${currentYear}`;

                                                                    </div>

                                    <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-md"><Icon name="calendar-days" size={20} /></div>

                                        <h2 className="font-black text-slate-900 text-xl tracking-tighter uppercase">Daily Post Pipeline</h2>

                            </div>
                            
                            {/* Row-by-Row Layout with Scrollbar and Weekly Breakdown */}

                                    <div key={wIdx} className="bg-slate-100/50 p-4 rounded-2xl border border-slate-200/60 shadow-sm">

                                                const expectedDateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
                                                const displayDateStr = `${String(dayNum).padStart(2, '0')}/${String(currentMonth + 1).padStart(2, '0')}/${currentYear}`;
                                                const todaysEvents = getEventsForDay(dayNum);

                                                let post = (postsData[selectedDay] || [])[i] || { text: "", status: "todo", type: "Static", date: expectedDateStr };
                                                
                                                // Auto-refresh: Check if stored post belongs to an older month. If so, render a blank slate!
                                                if (post.date && post.date !== expectedDateStr) {

                                                        >
                                                            <Icon name={statusIcon} size={16} className={post.status === 'in-progress' ? 'animate-spin' : ''} />
                                                            {statusText}
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* RESOURCES SECTION - FULL WIDTH */}

                                </div>

                        <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden w-full h-full flex flex-col">

                                <div className="flex items-center gap-3">

                                        <h2 className="font-black text-slate-900 text-xl tracking-tighter uppercase">Competitors</h2>

                                    </div>
                                </div>
                                <button onClick={addCompetitorRow} className="bg-white border border-slate-200 text-slate-700 px-5 py-3 rounded-xl text-[10px] font-black uppercase hover:border-red-300 hover:text-red-500 transition-all shadow-sm flex items-center justify-center gap-2">
                                    <Icon name="plus" size={14} /> Add Rival
                                </button>
                            </div>
                            <div className="p-6 flex flex-col gap-4 bg-slate-50/30 flex-1">

                                        <div key={comp.id} className="flex flex-col md:flex-row items-center gap-3 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm transition-all hover:border-red-300 group">

                                                {i + 1}
                                            </div>
                                            <input 
                                                type="text" 
                                                placeholder="Competitor Name..." 
                                                className="w-full md:w-1/3 bg-slate-50 outline-none text-sm font-bold text-slate-700 placeholder-slate-400 focus:ring-2 focus:ring-red-100 p-4 rounded-xl transition-all shadow-inner"
                                                value={comp.name}
                                                onChange={(e) => updateCompetitor(i, 'name', e.target.value)}
                                            />
                                            <input 
                                                type="text" 
                                                placeholder="Website or Social Link..." 
                                                className="flex-1 w-full bg-slate-50 outline-none text-sm font-bold text-slate-700 placeholder-slate-400 focus:ring-2 focus:ring-red-100 p-4 rounded-xl transition-all shadow-inner"

                                                onChange={(e) => updateCompetitor(i, 'url', e.target.value)}
                                            />

                                                <a href={comp.url} target="_blank" className="hidden md:flex p-4 text-slate-400 hover:text-blue-500 transition-all bg-slate-50 hover:bg-blue-50 rounded-xl">
                                                    <Icon name="external-link" size={18} />
                                                </a>
                                            )}

                        <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden border-l-[12px] border-l-yellow-400 w-full">
                            <div className="px-10 py-8 border-b border-slate-100 bg-yellow-400/5 flex flex-col md:flex-row md:items-center justify-between gap-8">
                                <div className="flex items-center gap-4">
                                    <div className="bg-yellow-400 p-3 rounded-2xl text-yellow-900 shadow-inner"><Icon name="lightbulb" size={24} /></div>
                                    <div>
                                        <h2 className="font-black text-slate-900 text-2xl tracking-tighter uppercase">Idea Vault</h2>
                                        <p className="text-[10px] font-bold text-yellow-600 uppercase tracking-widest">Global Brainstorming</p>
                                    </div>
                                </div>
                                
                                <div className="flex gap-1.5 overflow-x-auto no-scrollbar py-1">
                                    {vaultTabs.map(tab => (
                                        <button 
                                            key={tab.id} 
                                            onClick={() => setSelectedIdeaClient(tab.id)} 
                                            className={`whitespace-nowrap px-4 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${selectedIdeaClient === tab.id ? 'bg-slate-900 text-white shadow-xl scale-105' : 'bg-white text-slate-400 border border-slate-100 hover:border-slate-300'}`}
                                        >
                                            {tab.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="p-10">
                                <form onSubmit={addIdea} className="flex gap-4 mb-10">
                                    <input type="text" value={newIdea} onChange={(e) => setNewIdea(e.target.value)} placeholder={`Drop a creative spark for ${selectedIdeaClient.split(' ')[0]}...`} className="flex-1 bg-slate-50 border border-slate-200 rounded-[1.5rem] px-8 py-5 text-sm outline-none focus:ring-4 focus:ring-yellow-400/10 font-bold" />
                                    <button type="submit" className="bg-yellow-400 text-yellow-950 font-black px-10 py-5 rounded-[1.5rem] text-[11px] tracking-widest uppercase hover:bg-yellow-500 btn-interact shadow-xl shadow-yellow-100">Store</button>
                                </form>
                                
                                <div className="flex flex-col gap-4 max-h-[500px] overflow-y-auto pr-4 custom-scrollbar">
                                    {(ideas[selectedIdeaClient] || []).length > 0 ? (
                                        (ideas[selectedIdeaClient] || []).map(idea => {
                                            
                                            // Extract URL from the text to generate the thumbnail
                                            const urlMatch = idea.text.match(/(https?:\/\/[^\s]+)/);
                                            const firstUrl = urlMatch ? urlMatch[0] : null;
                                            let domain = "";
                                            if (firstUrl) {
                                                try { domain = new URL(firstUrl).hostname; } catch(e) {}
                                            }

                                            return (
                                                <div key={idea.id} className="group flex justify-between items-center gap-4 p-5 md:p-6 bg-slate-50 rounded-[1.5rem] border border-slate-100 hover:border-yellow-400 hover:bg-white transition-all shadow-sm">
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-sm text-slate-800 font-bold leading-relaxed">
                                                            {renderTextWithLinks(idea.text)}
                                                        </p>
                                                    </div>
                                                    
                                                    <div className="flex items-center gap-4 flex-shrink-0">
                                                        {firstUrl && domain && (
                                                            <IdeaLinkPreview url={firstUrl} domain={domain} />
                                                        )}
                                                        
                                                        <button onClick={() => removeIdea(selectedIdeaClient, idea.id)} className="opacity-100 lg:opacity-0 lg:group-hover:opacity-100 text-slate-400 hover:text-red-500 transition-all p-3 bg-white rounded-xl shadow-sm border border-slate-100 flex-shrink-0 hover:bg-red-50">
                                                            <Icon name="trash-2" size={18} />
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    ) : (
                                        <div className="py-20 text-center border-4 border-dashed border-slate-50 rounded-[2.5rem]">
                                            <Icon name="inbox" className="mx-auto text-slate-200 mb-4" size={48} />
                                            <p className="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em]">Vault is currently empty</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                    </main>
                    )}

                    <footer className="fixed bottom-0 left-0 right-0 glass-effect px-6 py-4 z-50 flex flex-col md:flex-row justify-between items-center gap-4 border-t border-slate-200">
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-full shadow-lg">
                                <div className={`w-2.5 h-2.5 rounded-full shadow-sm ${
                                    authStatus === 'connected' ? (isSyncing ? 'bg-yellow-400 animate-save' : 'bg-green-500') : 
                                    authStatus === 'error' ? 'bg-red-500' : 'bg-slate-500 animate-pulse'
                                }`}></div>
                                <span className="text-[9px] font-black uppercase tracking-[0.2em]">
                                    {authStatus === 'connected' ? (isSyncing ? 'Syncing...' : 'Live & Synced') : 
                                     authStatus === 'error' ? 'Sync Error' : 'Connecting...'}
                                </span>
                            </div>
                        </div>
                        
                        <div className="flex gap-1.5 overflow-x-auto no-scrollbar max-w-full py-1">
                            {displayDays.map(d => (
                                <button 
                                    key={d} 
                                    onClick={() => setSelectedDay(d)} 
                                    className={`flex flex-col items-center justify-center px-5 py-2 rounded-xl transition-all min-w-max ${
                                        selectedDay === d 
                                        ? (d === 'Master' || d === 'Calendar' ? 'bg-slate-900 text-white shadow-xl scale-105' : 'bg-blue-600 text-white shadow-xl shadow-blue-100 scale-105') 
                                        : 'bg-white border border-slate-100 hover:bg-slate-50'
                                    }`}
                                >
                                    <span className={`text-[10px] font-black uppercase tracking-[0.1em] ${selectedDay === d ? 'text-white' : 'text-slate-400'}`}>
                                        {d}
                                    </span>
                                    <span className={`text-[9px] font-bold mt-0.5 ${selectedDay === d ? (d === 'Master' || d === 'Calendar' ? 'text-slate-300' : 'text-blue-200') : 'text-slate-500'}`}>
                                        {clientsData[d].name}
                                    </span>
                                </button>
                            ))}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
